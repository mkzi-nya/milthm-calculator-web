<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>花园规划器</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1d2230; --text:#e8ecf1; --muted:#aeb8c6;
    --green:#30d158; --red:#ff5f57; --blue:#64b5ff; --border:#2a3242; --warn:#ffcc66;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; padding:18px;
    color:var(--text); background:var(--bg);
    font:14px/1.5 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .wrap { max-width:1120px; margin:0 auto; }
  h1 { font-size:22px; line-height:1.2; margin:0 0 14px; letter-spacing:.02em; }
  .panel {
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:16px; margin-bottom:14px;
  }
  .row { display:grid; grid-template-columns:repeat(12,minmax(0,1fr)); gap:12px; margin-bottom:14px; }
  .row:last-child { margin-bottom:0; }
  .field { grid-column:span 3; min-width:0; }
  .field.wide { grid-column:span 6; }
  .field.full { grid-column:1 / -1; }
  label { display:block; margin:0 0 7px; color:var(--muted); font-size:13px; }
  input, select, button {
    width:100%; min-width:0; height:40px;
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:10px; padding:8px 10px; font:inherit; outline:none;
  }
  input:focus, select:focus { border-color:var(--blue); }
  button { cursor:pointer; background:#2457ff; border-color:#2457ff; font-weight:700; }
  .check-group {
    display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px;
  }
  .check-group label {
    height:40px; margin:0; padding:0 10px;
    display:flex; align-items:center; justify-content:center; gap:7px;
    color:var(--text); background:var(--panel2); border:1px solid var(--border); border-radius:10px;
    white-space:nowrap;
  }
  .check-group input { width:auto; height:auto; }
  .stock-grid {
    display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px;
  }
  .stock-card {
    min-width:0; display:flex; flex-direction:column; gap:7px;
    background:var(--panel2); border:1px solid var(--border); border-radius:12px; padding:9px 8px;
  }
  .stock-card .name {
    width:100%; font-weight:700; font-size:13px; line-height:1.2;
    min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center;
  }
  .stock-card input { height:32px; padding:5px 6px; text-align:center; font-size:14px; }
  .result { font-size:18px; font-weight:800; color:var(--blue); padding-top:2px; }
  .warn { color:var(--warn); }
  .log {
    min-height:360px; white-space:pre-wrap; overflow:auto;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  .line { margin:0 0 12px; }
  .plus { color:var(--green); font-weight:700; }
  .minus { color:var(--red); font-weight:700; }
  .stamp { color:var(--blue); font-weight:700; }
  .act { color:#fff; font-weight:700; }
  .small { color:var(--muted); font-size:12px; }
  @media (max-width:900px){
    .field,.field.wide{ grid-column:span 6; }
  }
  @media (max-width:560px){
    body{ padding:10px; }
    .panel{ padding:12px; border-radius:14px; }
    .row{ gap:10px; }
    .field,.field.wide,.field.full{ grid-column:1 / -1; }
    .stock-grid,.check-group{ grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .stock-card{ padding:8px 6px; border-radius:11px; }
    .stock-card .name{ font-size:12px; }
    .stock-card input{ height:30px; padding:4px 4px; }
    .check-group label{ height:36px; padding:0 4px; font-size:13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>花园规划器</h1>

  <div class="panel">
    <div class="row">
      <div class="field wide">
        <label>已解锁花盆</label>
        <div class="check-group" id="potsBox"></div>
      </div>
      <div class="field">
        <label>浇水次数</label>
        <select id="water"></select>
      </div>
      <div class="field">
        <label>初始等级</label>
        <select id="startLevel"></select>
      </div>
    </div>

    <div class="row">
      <div class="field full">
        <label>初始作物库存</label>
        <div id="stockBox" class="stock-grid"></div>
      </div>
    </div>

    <div class="row">
      <div class="field"><label>目标等级</label><select id="targetLevel"></select></div>
      <div class="field full">
        <label>目标库存</label>
        <div id="targetBox" class="stock-grid"></div>
      </div>
    </div>

    <div class="row">
      <div class="field"><button id="calcBtn">计算</button></div>
      <div class="field wide"><label>预计完成时长</label><div id="result" class="result">预计完成时长：--h</div></div>
    </div>
  </div>

  <div class="panel">
    <div><strong>过程输出</strong></div>
    <div id="log" class="log"></div>
  </div>
</div>

function emptyCost(){ return Object.fromEntries(TAG_KEYS.map(k=>[k,0])); }
function scaleCost(cost, n){ const out=emptyCost(); for(const key of TAG_KEYS) out[key]=Number((cost&&cost[key])||0)*Number(n||0); return out; }
function addCostInto(dst, src, mult=1){ for(const key of TAG_KEYS) dst[key]=Number(dst[key]||0)+Number((src&&src[key])||0)*mult; return dst; }


function fmtNum(v){

  return Math.abs(n-Math.round(n))<1e-9 ? String(Math.round(n)) : n.toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
}
function fmtHourValue(hours){

  return h.toFixed(2).replace(/\.00$/,'').replace(/(\.\d)0$/,'$1');
}

function cropTimeHours(name, water){ return (CROPS[name].time * WATER_MULT[water]) / 60; }

function getItemTags(name){ const def=getItemDef(name); return def ? def.tags : []; }
function parseCropCosts(costs){
  const req = emptyCost();
  for(const s of costs || []){

    req[TAG_TO_KEY[tag]] += Number(amount||0);
  }
  return req;
}
function availableCrops(level){ return enabledCropNames().filter(name=>Number(CROPS[name].unlock||1)<=level); }
function primaryKeyForCrop(name){
  const tags=getItemTags(name).map(tag=>TAG_TO_KEY[tag]);
  if(!tags.length) return null;
  tags.sort((a,b)=>TAG_RARITY[b]-TAG_RARITY[a]);

function cropCategory(name){

  if(!keys.length) return null;
  if(keys.includes('func') && keys.includes('orn')) return 'OF';
  if(keys.includes('func')) return 'F';
  if(keys.includes('orn')) return 'O';
  if(keys.includes('fungus') || keys.includes('food')) return 'D';

function cropProfitRateWithCategoryRates(name, categoryRates, water){
  const c=CROPS[name];
  let totalHours=cropTimeHours(name, water);
  for(const s of c.costs || []){
    const [tag,amount]=s.split('*');
    const rate=categoryRates[tag]||0;
    if(rate<=1e-12) return null;

}
function solveBestCategoryRates(level, water){
  const key=`${level}|${water}`;
  if(RATE_CACHE.has(key)) return RATE_CACHE.get(key);
  const crops=availableCrops(level);
  const categoryRates={};
  for(const tag of TAGS){
    let best=0;
    for(const name of crops){
      if(!CROPS[name].tags.includes(tag)) continue;
      best=Math.max(best, CROPS[name].yield/Math.max(cropTimeHours(name, water), 1e-12));
    }
    categoryRates[tag]=best;
  }
  for(let iter=0; iter<999; iter++){
    let changed=0;
    const cropRates={};
    for(const name of crops) cropRates[name]=cropProfitRateWithCategoryRates(name, categoryRates, water);
    const nextRates={};
    for(const tag of TAGS){
      let best=0;
      for(const name of crops){
        if(!CROPS[name].tags.includes(tag)) continue;
        best=Math.max(best, cropRates[name]||0);
      }
      nextRates[tag]=best;
      changed=Math.max(changed, Math.abs((nextRates[tag]||0)-(categoryRates[tag]||0)));
    }
    Object.assign(categoryRates, nextRates);
    if(changed<1e-12) break;
  }
  const cropRates={};
  for(const name of crops) cropRates[name]=cropProfitRateWithCategoryRates(name, categoryRates, water) || 0;
  const result={ categoryRates:{...categoryRates}, cropRates };
  RATE_CACHE.set(key, result);
  return result;
}
function cropBestRate(level, water, name){ return solveBestCategoryRates(level, water).cropRates[name] || 0; }
function renderCropTable(level, water){
  const rateInfo=solveBestCategoryRates(level, water);

    const c=CROPS[name];
    return `<tr><td>${name}</td><td>${c.tags.join('/')}</td><td>${fmtNum(c.yield)}</td><td>${fmtDuration(cropTimeHours(name,water))}</td><td>${c.costs.length?c.costs.join('，'):'无'}</td><td>${fmtNum(rateInfo.cropRates[name]||0)}/h</td></tr>`;
  }).join('');
  return `<div class="small">当前阶段类别最高净收益：菌菇 ${fmtNum(rateInfo.categoryRates['菌菇']||0)}/h，食物 ${fmtNum(rateInfo.categoryRates['食物']||0)}/h，观赏 ${fmtNum(rateInfo.categoryRates['观赏']||0)}/h，功能 ${fmtNum(rateInfo.categoryRates['功能']||0)}/h</div><table><thead><tr><th>作物</th><th>tag</th><th>单次产量</th><th>单次时长</th><th>种植消耗</th><th>净收益</th></tr></thead><tbody>${rows || '<tr><td colspan="6">当前等级无可用作物</td></tr>'}</tbody></table>`;
}

function cloneGenericState(s){
  const out={ df:s.df||0, sd:s.sd||0, sf:s.sf||0, o:s.o||0, f:s.f||0, of:s.of||0 };
  out._labels={ ...(s&&s._labels ? s._labels : {}) };
  return out;
}
function tagTotalsFromGenericState(s){
  return {
    fungus:(s.sf||0)+(s.df||0),
    food:(s.sd||0)+(s.df||0),
    orn:(s.o||0)+(s.of||0),
    func:(s.f||0)+(s.of||0),
  };
}
function genericStateFromInventory(inv){
  const state={ df:0, sd:0, sf:0, o:0, f:0, of:0, _labels:{} };
  for(const [name,countRaw] of Object.entries(inv||{})){
    const count=Number(countRaw||0);
    if(!count) continue;
    const cat=cropCategory(name);
    if(cat==='D'){ state.df += count; state._labels.df=name; }
    else if(cat==='O'){ state.o += count; state._labels.o=name; }
    else if(cat==='F'){ state.f += count; state._labels.f=name; }
    else if(cat==='OF'){ state.of += count; state._labels.of=name; }
    else {
      const tags=getItemTags(name);
      if(tags.length===1){
        if(tags[0]==='食物') state.sd += count;
        else if(tags[0]==='菌菇') state.sf += count;
        else if(tags[0]==='观赏') state.o += count;
        else if(tags[0]==='功能') state.f += count;
      }
    }
  }
  return state;
}
function targetProgressFromGenericState(state, target){
  const tgt=target||{};
  const progress={ fungus:0, food:0, orn:0, func:0 };
  progress.food += Number(state.sd||0);
  progress.fungus += Number(state.sf||0);
  progress.orn += Number(state.o||0);
  progress.func += Number(state.f||0);
  const ofCount=Number(state.of||0);
  const useFunc=Math.min(ofCount, Math.max(0, Number(tgt.func||0)-progress.func));
  progress.func += useFunc;
  progress.orn += ofCount - useFunc;
  const dCount=Number(state.df||0);
  const useFungus=Math.min(dCount, Math.max(0, Number(tgt.fungus||0)-progress.fungus));
  progress.fungus += useFungus;
  progress.food += dCount - useFungus;
  return progress;
}
function targetExcessFromGenericState(state, target){
  const p=targetProgressFromGenericState(state, target||{});
  let excess=0;
  for(const key of TAG_KEYS){
    const need=Number((target&&target[key])||0);
    if(need>0) excess += Math.max(0, Number(p[key]||0)-need);
  }
  return excess;
}
function targetDeficitsFromGenericState(state, target){
  const p=targetProgressFromGenericState(state, target||{});
  return {
    fungus:Math.max(0, Number((target&&target.fungus)||0)-p.fungus),
    food:Math.max(0, Number((target&&target.food)||0)-p.food),
    orn:Math.max(0, Number((target&&target.orn)||0)-p.orn),
    func:Math.max(0, Number((target&&target.func)||0)-p.func),
  };
}
function sumTargetDeficits(miss){
  return Number(miss.fungus||0)+Number(miss.food||0)+Number(miss.orn||0)+Number(miss.func||0);
}
function solveSharedPairPayment(onlyA, onlyB, shared, needA, needB){
  const a=Math.max(0, Number(needA||0));
  const b=Math.max(0, Number(needB||0));
  onlyA=Number(onlyA||0); onlyB=Number(onlyB||0); shared=Number(shared||0);
  if(a<=0 && b<=0) return { onlyA, onlyB, shared };
  // shared 是一份多 tag 作物库存。消耗 1 个 shared 可以同时满足 A/B 两个 tag，
  // 也可以只用于其中一个 tag；因此上限应是 max(a,b)，不能错误地限制成 min(a,b)。
  const minShared=Math.max(0, a-onlyA, b-onlyB);
  const maxShared=Math.min(shared, Math.max(a,b));
  if(minShared>maxShared) return null;
  const useShared=minShared;
  const useA=Math.max(0, a-useShared);
  const useB=Math.max(0, b-useShared);
  if(useA>onlyA || useB>onlyB) return null;
  return { onlyA:onlyA-useA, onlyB:onlyB-useB, shared:shared-useShared };
}
function payCostOnGenericState(state, cost){
  const st=cloneGenericState(state);
  const dfPaid=solveSharedPairPayment(st.sd, st.sf, st.df, Number(cost.food||0), Number(cost.fungus||0));
  if(!dfPaid) return null;
  st.sd=dfPaid.onlyA;
  st.sf=dfPaid.onlyB;
  st.df=dfPaid.shared;
  const ofPaid=solveSharedPairPayment(st.o, st.f, st.of, Number(cost.orn||0), Number(cost.func||0));
  if(!ofPaid) return null;
  st.o=ofPaid.onlyA;
  st.f=ofPaid.onlyB;
  st.of=ofPaid.shared;
  return st;
}

function solveSharedPairPaymentDetailed(onlyA, onlyB, shared, needA, needB, labelA, labelB, sharedLabel){
  const a=Math.max(0, Number(needA||0));
  const b=Math.max(0, Number(needB||0));
  onlyA=Number(onlyA||0); onlyB=Number(onlyB||0); shared=Number(shared||0);
  if(a<=0 && b<=0) return { onlyA, onlyB, shared, parts:[] };
  const minShared=Math.max(0, a-onlyA, b-onlyB);
  const maxShared=Math.min(shared, Math.max(a,b));
  if(minShared>maxShared) return null;
  const useShared=minShared;
  const useOnlyA=Math.max(0, a-useShared);
  const useOnlyB=Math.max(0, b-useShared);
  if(useOnlyA>onlyA || useOnlyB>onlyB) return null;
  const parts=[];
  if(useShared>0) parts.push({ label:sharedLabel, count:useShared });
  if(useOnlyA>0) parts.push({ label:labelA, count:useOnlyA });
  if(useOnlyB>0) parts.push({ label:labelB, count:useOnlyB });
  return { onlyA:onlyA-useOnlyA, onlyB:onlyB-useOnlyB, shared:shared-useShared, parts };
}

function cropNamesByCategory(category){
  return cropNames().filter(name=>cropCategory(name)===category);
}
function bucketKeyForCategory(category){
  if(category==='D') return 'df';
  if(category==='O') return 'o';
  if(category==='F') return 'f';
  if(category==='OF') return 'of';
  return null;
}
function preferredCropName(category, counts=null, state=null){
  const names=cropNamesByCategory(category);
  if(counts){
    const planted=names.filter(name=>Number(counts[name]||0)>0).sort((a,b)=>Number(counts[b]||0)-Number(counts[a]||0));
    if(planted.length) return planted[0];
  }
  const bucket=bucketKeyForCategory(category);
  if(state && state._labels && bucket && state._labels[bucket]) return state._labels[bucket];
  if(category==='OF' && CROPS['毛茛']) return '毛茛';
  if(category==='D' && CROPS['双孢蘑菇']) return '双孢蘑菇';
  const enabled=names.filter(name=>!CROPS[name].disabled).sort((a,b)=>Number(CROPS[a].unlock||1)-Number(CROPS[b].unlock||1));
  if(enabled.length) return enabled[0];
  const disabled=names.filter(name=>CROPS[name].disabled).sort((a,b)=>Number(CROPS[a].unlock||1)-Number(CROPS[b].unlock||1));
  if(disabled.length) return disabled[0];
  return category;
}
function labelForSingleBucket(key, counts=null, state=null){
  if(key==='sd') return '食物';
  if(key==='sf') return '菌菇';
  if(key==='o') return preferredCropName('O', counts, state);
  if(key==='f') return preferredCropName('F', counts, state);
  return key;
}
function paymentSummaryOnGenericState(state, cost, counts=null){
  const st=cloneGenericState(state);
  const dfPaid=solveSharedPairPaymentDetailed(st.sd, st.sf, st.df, Number(cost.food||0), Number(cost.fungus||0), labelForSingleBucket('sd', counts, st), labelForSingleBucket('sf', counts, st), preferredCropName('D', counts, st));
  if(!dfPaid) return null;
  st.sd=dfPaid.onlyA;
  st.sf=dfPaid.onlyB;
  st.df=dfPaid.shared;
  const ofPaid=solveSharedPairPaymentDetailed(st.o, st.f, st.of, Number(cost.orn||0), Number(cost.func||0), labelForSingleBucket('o', counts, st), labelForSingleBucket('f', counts, st), preferredCropName('OF', counts, st));
  if(!ofPaid) return null;
  st.o=ofPaid.onlyA;
  st.f=ofPaid.onlyB;
  st.of=ofPaid.shared;
  const merged=new Map();
  for(const part of [...dfPaid.parts, ...ofPaid.parts]) merged.set(part.label, (merged.get(part.label)||0)+part.count);
  const order=cropNames().concat(['食物','菌菇','观赏','功能']);
  const parts=Array.from(merged.entries()).sort((a,b)=>{
    const ia=order.indexOf(a[0]), ib=order.indexOf(b[0]);
    return (ia<0?999:ia)-(ib<0?999:ib);
  });
  return { state:st, text:parts.length ? parts.map(([label,count])=>`${label}*${fmtNum(count)}`).join('，') : '无' };
}

function canPayCostOnGenericState(state, cost){ return !!payCostOnGenericState(state, cost); }
function seedCostOfCrop(name){ return parseCropCosts(CROPS[name].costs||[]); }
function cropOutputBucket(name){ return cropCategory(name); }
function addCropYieldToGenericState(state, crop, count=1){
  const st=cloneGenericState(state);
  const amount=Number(CROPS[crop].yield||0)*Number(count||0);
  const cat=cropOutputBucket(crop);
  if(cat==='D'){ st.df += amount; st._labels.df=crop; }
  else if(cat==='O'){ st.o += amount; st._labels.o=crop; }
  else if(cat==='F'){ st.f += amount; st._labels.f=crop; }
  else if(cat==='OF'){ st.of += amount; st._labels.of=crop; }
  else return null;
  return st;
}
function costOverlapsCropOutput(crop, cost){
  const outputKeys=getItemTags(crop).map(tag=>TAG_TO_KEY[tag]).filter(Boolean);
  return outputKeys.some(key=>Number((cost&&cost[key])||0)>0);
}
function plantOnceOnGenericState(state, crop){
  let st=cloneGenericState(state);
  const seed=seedCostOfCrop(crop);
  st=payCostOnGenericState(st, seed);

  return addCropYieldToGenericState(st, crop, 1);
}
function applyCropBatch(state, crop, n){
  n=Number(n||0);
  let st=cloneGenericState(state);
  if(n<=0) return st;
  const seed=seedCostOfCrop(crop);
  const totalSeed=scaleCost(seed, n);
  const needsSeed=TAG_KEYS.some(key=>Number(seed[key]||0)>0);
  if(!needsSeed) return addCropYieldToGenericState(st, crop, n);
  if(!canPayCostOnGenericState(st, seed)) return null;
  if(costOverlapsCropOutput(crop, seed)){
    st=addCropYieldToGenericState(st, crop, n);
    if(!st) return null;
    st=payCostOnGenericState(st, totalSeed);
    if(!st) return null;
    return st;
  }
  st=payCostOnGenericState(st, totalSeed);
  if(!st) return null;
  return addCropYieldToGenericState(st, crop, n);
}
function applyPlantCountsBlock(state, counts, order){
  let st=cloneGenericState(state);
  for(const crop of order){
    const n=Number(counts[crop]||0);
    st=applyCropBatch(st, crop, n);
    if(!st) return null;
  }
  return st;
}
function totalCostFromActions(actions){

    }
  }
  return bestName;
}
function buildKeyEvents(startLevel, horizonLevel, desiredPots, water){
  const events=[];
  const prev={
    D:categoryBestProducer('D', startLevel, water),
    O:categoryBestProducer('O', startLevel, water),
    F:categoryBestProducer('F', startLevel, water),
  };
  for(let lv=startLevel+1; lv<=horizonLevel; lv++){
    for(const cat of ['D','O','F']){
      const best=categoryBestProducer(cat, lv, water);
      if(best!==prev[cat] && prev[cat]!=null){
        events.push({ kind:'cropImprovement', level:lv, category:cat, crop:best, text:`解锁${best}` });
      }
      prev[cat]=best;
    }
    for(const pot of desiredPots){
      if(pot===1) continue;
      if(POT_UNLOCKS[pot] && POT_UNLOCKS[pot].level===lv) events.push({ kind:'potUnlock', level:lv, pot, text:`解锁${pot}号花盆` });
    }
  }
  return events;
}
function buildPlanningEvents(startLevel, targetLevel, desiredPots, water, horizonLevel){
  const keyEvents=buildKeyEvents(startLevel, horizonLevel, desiredPots, water);
  const events=[];
  let inserted=false;
  if(targetLevel<=startLevel){
    events.push({ kind:'checkpoint', level:startLevel, text:`达到Lv.${startLevel}` });
    inserted=true;
  }
  for(const event of keyEvents){
    if(!inserted && targetLevel<=event.level){
      events.push({ kind:'checkpoint', level:targetLevel, text:`达到Lv.${targetLevel}` });
      inserted=true;
    }
    events.push(event);
  }
  if(!inserted) events.push({ kind:'checkpoint', level:targetLevel, text:`达到Lv.${targetLevel}` });
  return events;
}
function stageActions(startLevel, event){
  const actions=[];
  for(let lv=startLevel+1; lv<=event.level; lv++) actions.push({ kind:'levelUp', level:lv, cost:{ ...(LEVEL_COSTS[lv]||{}) }, text:`升级到Lv.${lv}` });
  if(event.kind==='potUnlock') actions.push({ kind:'unlockPot', level:event.level, pot:event.pot, cost:{ ...(POT_UNLOCKS[event.pot].cost||{}) }, text:`解锁${event.pot}号花盆` });
  return actions;
}
function previousCategoryBestProducer(category, level, water){
  if(level<=0) return null;
  return categoryBestProducer(category, level, water);
}

function bestSeedFeasibleProducer(category, level, water, state, excludeName=null){
  const names=availableCrops(level).filter(name=>producerCategory(name)===category && name!==excludeName);
  let best=null, bestRate=-1;
  for(const name of names){
    const seed=seedCostOfCrop(name);
    if(seed && !canPayCostOnGenericState(state, seed)) continue;
    const rate=cropBestRate(level, water, name);
    if(rate>bestRate+1e-9 || (Math.abs(rate-bestRate)<=1e-9 && (best==null || CROPS[name].unlock<CROPS[best].unlock))){
      best=name; bestRate=rate;
    }
  }
  return best;
}

function costNeedsCategory(cost, category){
  if(category==='D') return Number(cost.food||0)>0 || Number(cost.fungus||0)>0;
  if(category==='O') return Number(cost.orn||0)>0;
  if(category==='F') return Number(cost.func||0)>0;
  return false;
}
function ensureSeedDependencyProducers(mains, windowLevel, water){
  let changed=true;
  while(changed){
    changed=false;
    for(const crop of Object.values(mains).filter(Boolean)){
      const seed=seedCostOfCrop(crop);
      for(const cat of CATEGORY_KEYS){
        if(costNeedsCategory(seed, cat) && !mains[cat]){
          const producer=categoryBestProducer(cat, windowLevel, water);
          if(producer){ mains[cat]=producer; changed=true; }
        }
      }
    }
  }
}
function costForPlantedCounts(counts){
  const total=emptyCost();
  for(const [crop,n] of Object.entries(counts||{})) addCostInto(total, seedCostOfCrop(crop), Number(n||0));
  return total;
}
function cropNetForCategory(crop, category){
  const seed=seedCostOfCrop(crop);
  const yieldValue=Number(CROPS[crop].yield||0);
  if(category==='D') return Math.max(1, yieldValue - Number(seed.food||0) - Number(seed.fungus||0));
  if(category==='O') return Math.max(1, yieldValue - Number(seed.orn||0));
  if(category==='F') return Math.max(1, yieldValue - Number(seed.func||0));
  return Math.max(1, yieldValue);
}

function buildStageProducerPlan(startLevel, event, water, startState=null){
  const actions=stageActions(startLevel, event);
  const windowLevel = event.kind==='cropImprovement' ? Math.max(1, event.level-1) : event.level;
  const total=totalCostFromActions(actions);
  const deficits=(startState && event.target) ? targetDeficitsFromGenericState(startState, event.target) : emptyCost();
  const need={
    D:(Number(total.food||0)+Number(total.fungus||0)+Number(deficits.food||0)+Number(deficits.fungus||0))>0,
    O:(Number(total.orn||0)+Number(deficits.orn||0))>0,
    F:(Number(total.func||0)+Number(deficits.func||0))>0,
  };
  const mains={ D:null, O:null, F:null };
  for(const cat of CATEGORY_KEYS){ if(need[cat]) mains[cat]=categoryBestProducer(cat, windowLevel, water); }
  ensureSeedDependencyProducers(mains, windowLevel, water);
  const prevLevel=Math.max(1, startLevel-1);
  const boot={ D:null, O:null, F:null };
  const state=startState || { df:0, sd:0, sf:0, o:0, f:0, of:0 };
  for(const cat of CATEGORY_KEYS){
    const main=mains[cat];
    if(!main) continue;
    const seed=seedCostOfCrop(main);
    if(seed && !canPayCostOnGenericState(state, seed)){
      boot[cat]=bestSeedFeasibleProducer(cat, windowLevel, water, state, main);
    }else{
      const prev=previousCategoryBestProducer(cat, prevLevel, water);
      if(prev && prev!==main) boot[cat]=prev;
    }
  }
  return { mains, boot, actions };
}
function nextStageBootstrapReserve(nextStartLevel, nextEvent, water){
  if(!nextEvent) return null;

  // 预留下一阶段主力作物的启动材料。
  // 旧版只预留第一个主力作物的种子费；当下一阶段是最终库存阶段时，
  // 例如 Lv.22 后要种香菇 + 铃兰，Lv.21→Lv.22 的支付可能会把食物/功能启动料全部吃掉，
  // 导致下一阶段被迫回退种草菇/其它前驱作物。这里改为预留所有下一阶段主力及其依赖主力的种子费。
  const seedProbeState = nextEvent.kind==='finalInventory'
    ? { df:0, sd:0, sf:0, o:0, f:0, of:0 }
    : null;
  const plan=buildStageProducerPlan(nextStartLevel, nextEvent, water, seedProbeState);
  const reserve=emptyCost();
  let has=false;
  for(const cat of CATEGORY_KEYS){
    const name=plan.mains && plan.mains[cat];
    if(!name) continue;
    addCostInto(reserve, seedCostOfCrop(name));
    has=true;
  }
  if(!has) return null;
  return reserve;
}
function extendProducerPlanForReserve(startLevel, event, water, startState, mains, boot, reserve){
  if(!reserve) return;
  const windowLevel = event.kind==='cropImprovement' ? Math.max(1, event.level-1) : event.level;
  for(const cat of CATEGORY_KEYS){
    if(costNeedsCategory(reserve, cat) && !mains[cat]){
      const producer=categoryBestProducer(cat, windowLevel, water);
      if(producer) mains[cat]=producer;
    }
  }
  ensureSeedDependencyProducers(mains, windowLevel, water);
  const prevLevel=Math.max(1, startLevel-1);
  const state=startState || { df:0, sd:0, sf:0, o:0, f:0, of:0 };
  for(const cat of CATEGORY_KEYS){
    const main=mains[cat];
    if(!main || boot[cat]) continue;
    const seed=seedCostOfCrop(main);
    if(seed && !canPayCostOnGenericState(state, seed)){
      boot[cat]=bestSeedFeasibleProducer(cat, windowLevel, water, state, main);
    }else{
      const prev=previousCategoryBestProducer(cat, prevLevel, water);
      if(prev && prev!==main) boot[cat]=prev;
    }
  }
}
function lowerBoundCounts(startState, actions, producers, reserve, event){
  const totals=totalCostFromActions(actions);
  const targetDef=event && event.target ? targetDeficitsFromGenericState(startState, event.target) : emptyCost();
  const lb={};
  if(producers.O){
    const y=cropNetForCategory(producers.O, 'O');
    let needOrn=Number(totals.orn||0) + Number(targetDef.orn||0);
    const currentOrn=(startState.o||0)+(startState.of||0);
    lb[producers.O]=Math.max(0, Math.ceil(Math.max(0, needOrn-currentOrn)/y));
  }
  if(producers.F){
    let needFunc=Number(totals.func||0) + Number((reserve&&reserve.func)||0) + Number(targetDef.func||0);
    if(producers.O){
      const oSeed=seedCostOfCrop(producers.O);
      needFunc += Number(oSeed.func||0) * Number(lb[producers.O]||0);
    }
    const currentFunc=(startState.f||0)+(startState.of||0);
    lb[producers.F]=Math.max(0, Math.ceil(Math.max(0, needFunc-currentFunc)/cropNetForCategory(producers.F, 'F')));
  }
  if(producers.D){
    let needPay=Number(totals.food||0)+Number(totals.fungus||0)+Number((reserve&&reserve.food)||0)+Number((reserve&&reserve.fungus)||0);
    if(producers.F){
      const fSeed=seedCostOfCrop(producers.F);
      needPay += (Number(fSeed.food||0)+Number(fSeed.fungus||0)) * Number(lb[producers.F]||0);
    }
    if(producers.O){
      const oSeed=seedCostOfCrop(producers.O);
      needPay += (Number(oSeed.food||0)+Number(oSeed.fungus||0)) * Number(lb[producers.O]||0);
    }
    const currentPay=(startState.df||0)+(startState.sd||0)+(startState.sf||0);
    const targetNeed=Number(targetDef.fungus||0) + Number(targetDef.food||0);
    const net=cropNetForCategory(producers.D, 'D');
    lb[producers.D]=Math.max(0, Math.ceil(Math.max(0, needPay-currentPay + targetNeed)/net));
  }
  return lb;
}
function stageDurationHours(counts, producers, pots, water){
  let hours=0;
  for(const crop of [producers.D, producers.F, producers.O]){
    if(!crop) continue;
    hours += (Number(counts[crop]||0) * cropTimeHours(crop, water)) / Math.max(1, pots);
  }
  return hours;
}
function evalStageCounts(startState, actions, producers, reserve, event, pots, water, counts){
  const totalActionCost=totalCostFromActions(actions);
  const order=[producers.D, producers.F, producers.O].filter(Boolean);
  const afterProduction=applyPlantCountsBlock(startState, counts, order);
  if(!afterProduction) return null;
  const paid=paymentSummaryOnGenericState(afterProduction, totalActionCost, counts);
  if(!paid) return null;
  const st=paid.state;
  if(reserve && !canPayCostOnGenericState(st, reserve)) return null;
  if(event.target && sumTargetDeficits(targetDeficitsFromGenericState(st, event.target))>0) return null;
  const hours=stageDurationHours(counts, producers, pots, water);
  return { counts:{...counts}, actions, producers, reserve, hours, endState:st, payText:paid.text };
}
function uniqueSortedNumbers(values){
  return Array.from(new Set(values.filter(v=>Number.isFinite(v)).map(v=>Math.max(0, Math.floor(v))))).sort((a,b)=>a-b);
}
function candidateCountsAround(base, maxBase){
  base=Math.max(0, Math.floor(base||0));
  const vals=[base, base+1, base+2, base+4, base+8];
  if(base>0) vals.push(Math.max(0, base-1));
  return uniqueSortedNumbers(vals);
}

function exactLowerForF(startState, actions, producers, reserve, event, oCount){
  if(!producers.F) return 0;
  const totals=totalCostFromActions(actions);
  const targetDef=event && event.target ? targetDeficitsFromGenericState(startState, event.target) : emptyCost();
  let needFunc=Number(totals.func||0) + Number((reserve&&reserve.func)||0) + Number(targetDef.func||0);
  if(producers.O){
    const oSeed=seedCostOfCrop(producers.O);
    needFunc += Number(oSeed.func||0) * Number(oCount||0);
  }
  const currentFunc=(startState.f||0)+(startState.of||0);
  return Math.max(0, Math.ceil(Math.max(0, needFunc-currentFunc)/cropNetForCategory(producers.F, 'F')));
}
function exactLowerForD(startState, actions, producers, reserve, event, oCount, fCount){
  if(!producers.D) return 0;
  const totals=totalCostFromActions(actions);
  const targetDef=event && event.target ? targetDeficitsFromGenericState(startState, event.target) : emptyCost();
  let needPay=Number(totals.food||0)+Number(totals.fungus||0)+Number((reserve&&reserve.food)||0)+Number((reserve&&reserve.fungus)||0);
  if(producers.F){
    const fSeed=seedCostOfCrop(producers.F);
    needPay += (Number(fSeed.food||0)+Number(fSeed.fungus||0)) * Number(fCount||0);
  }
  if(producers.O){
    const oSeed=seedCostOfCrop(producers.O);
    needPay += (Number(oSeed.food||0)+Number(oSeed.fungus||0)) * Number(oCount||0);
  }
  const currentPay=(startState.df||0)+(startState.sd||0)+(startState.sf||0);
  const targetNeed=Number(targetDef.fungus||0) + Number(targetDef.food||0);
  const net=cropNetForCategory(producers.D, 'D');
  return Math.max(0, Math.ceil(Math.max(0, needPay-currentPay + targetNeed)/net));
}
function findMinimalDForFixedOF(startState, actions, producers, reserve, event, pots, water, baseCounts, dBase){
  if(!producers.D){
    return evalStageCounts(startState, actions, producers, reserve, event, pots, water, baseCounts);
  }
  let lo=Math.max(0, Math.floor(dBase||0));
  let hi=lo;
  let res=null;
  for(let guard=0; guard<64; guard++){
    const counts={...baseCounts, [producers.D]:hi};
    res=evalStageCounts(startState, actions, producers, reserve, event, pots, water, counts);
    if(res) break;
    if(hi===0) hi=1;
    else hi*=2;
  }
  if(!res) return null;
  let best=res;
  while(lo<=hi){
    const mid=Math.floor((lo+hi)/2);
    const counts={...baseCounts, [producers.D]:mid};
    const r=evalStageCounts(startState, actions, producers, reserve, event, pots, water, counts);
    if(r){ best=r; hi=mid-1; } else lo=mid+1;
  }
  return best;
}
function stageResultScore(res, event, hoursOverride=null){
  const hours = hoursOverride==null ? Number(res.hours||0) : Number(hoursOverride||0);
  const planted = Object.values(res.counts||{}).reduce((a,b)=>a+Number(b||0),0);
  if(event && event.kind==='finalInventory' && event.target){
    const excess=targetExcessFromGenericState(res.endState, event.target);
    return [excess, hours, planted];
  }
  return [hours, planted, 0];
}
function isBetterScore(score, bestScore){
  if(!bestScore) return true;
  for(let i=0;i<Math.max(score.length,bestScore.length);i++){
    const a=Number(score[i]||0), b=Number(bestScore[i]||0);
    if(a < b - 1e-9) return true;
    if(a > b + 1e-9) return false;
  }
  return false;
}
function solveStageWithForcedProducers(startState, actions, producers, reserve, event, pots, water){
  const crops=[producers.D, producers.F, producers.O].filter(Boolean);
  const totalActionCost=totalCostFromActions(actions);
  if(!crops.length){
    const paid=paymentSummaryOnGenericState(cloneGenericState(startState), totalActionCost, null);
    if(!paid) return null;
    const st=paid.state;
    if(reserve && !canPayCostOnGenericState(st, reserve)) return null;
    if(event.target && sumTargetDeficits(targetDeficitsFromGenericState(st, event.target))>0) return null;
    return { counts:{}, actions, producers, reserve, hours:0, endState:st, payText:paid.text };
  }

  const lb=lowerBoundCounts(startState, actions, producers, reserve, event);
  const oBase=producers.O ? Number(lb[producers.O]||0) : 0;
  const fBase=producers.F ? Number(lb[producers.F]||0) : 0;
  const dBase=producers.D ? Number(lb[producers.D]||0) : 0;
  let best=null;

  const oCandidates=producers.O ? candidateCountsAround(oBase, oBase) : [0];
  for(const oCount of oCandidates){
    let fNeed=exactLowerForF(startState, actions, producers, reserve, event, oCount);
    if(producers.F) fNeed=Math.max(fNeed, Math.max(0, fBase-16));
    const fCandidates=producers.F ? candidateCountsAround(fNeed, fNeed<=256 ? fNeed : null) : [0];
    for(const fCount of fCandidates){
      const baseCounts={};
      if(producers.O) baseCounts[producers.O]=oCount;
      if(producers.F) baseCounts[producers.F]=fCount;
      const dNeed=exactLowerForD(startState, actions, producers, reserve, event, oCount, fCount);
      const dStart=producers.D ? Math.max(0, Math.min(dNeed, dBase + 32)) : 0;
      const res=findMinimalDForFixedOF(startState, actions, producers, reserve, event, pots, water, baseCounts, dStart);
      if(!res) continue;
      const score=stageResultScore(res, event);
      if(isBetterScore(score, best&&best.score)) best={...res, score};
    }
  }

  if(best) return best;

  // 兜底：从理论下界开始逐项放大，保证大阶段不会因为枚举窗口太窄而误判无解。
  const counts={};
  if(producers.O) counts[producers.O]=oBase;
  if(producers.F) counts[producers.F]=fBase;
  if(producers.D) counts[producers.D]=dBase;
  for(let guard=0; guard<80; guard++){
    const res=evalStageCounts(startState, actions, producers, reserve, event, pots, water, counts);
    if(res) return {...res, score:[res.hours, Object.values(res.counts).reduce((a,b)=>a+b,0)]};
    if(producers.D) counts[producers.D]=Math.max(1, Math.ceil((counts[producers.D]||0)*1.25)+8);
    if(producers.F) counts[producers.F]=Math.max(1, Math.ceil((counts[producers.F]||0)*1.15)+4);
    if(producers.O) counts[producers.O]=Math.max(1, Math.ceil((counts[producers.O]||0)*1.10)+2);
  }
  return null;
}

function minimalBootCountForMainSeed(state, bootCrop, mainCrop){
  if(!bootCrop || !mainCrop) return 0;
  let st=cloneGenericState(state);
  const seed=seedCostOfCrop(mainCrop);
  if(canPayCostOnGenericState(st, seed)) return 0;
  for(let i=1;i<=512;i++){
    st=plantOnceOnGenericState(st, bootCrop);
    if(!st) return 0;
    if(canPayCostOnGenericState(st, seed)) return i;
  }
  return 512;
}
function smallBootCandidates(base){
  base=Math.max(0, Math.floor(base||0));
  return uniqueSortedNumbers([base, base+1, base+2]);
}
function solveStage(startLevel, event, nextEvent, startState, pots, water){
  const { mains, boot, actions } = buildStageProducerPlan(startLevel, event, water, startState);
  const reserve=nextStageBootstrapReserve(event.level, nextEvent, water);
  extendProducerPlanForReserve(startLevel, event, water, startState, mains, boot, reserve);

  const bootBase={ D:0, F:0, O:0 };
  let probe=cloneGenericState(startState);
  if(boot.D && mains.D){
    bootBase.D=minimalBootCountForMainSeed(probe, boot.D, mains.D);
    probe=applyCropBatch(probe, boot.D, bootBase.D) || probe;
  }
  // 主线顺序是 D → F → O。若 D 主力存在，F 的食物种子会由 D 主力解决，不需要在 boot 阶段强行枚举。
  if(boot.F && mains.F && !mains.D){
    bootBase.F=minimalBootCountForMainSeed(probe, boot.F, mains.F);
    probe=applyCropBatch(probe, boot.F, bootBase.F) || probe;
  }
  // 若 F 主力存在，铃兰等 O 作物需要的功能种子会由 F 主力解决。
  if(boot.O && mains.O && !mains.F){
    bootBase.O=minimalBootCountForMainSeed(probe, boot.O, mains.O);
  }

  const bootRanges={
    D: boot.D ? smallBootCandidates(bootBase.D) : [0],
    F: boot.F ? smallBootCandidates(bootBase.F) : [0],
    O: boot.O ? smallBootCandidates(bootBase.O) : [0],
  };

  let best=null;
  for(const bD of bootRanges.D){
    for(const bF of bootRanges.F){
      for(const bO of bootRanges.O){
        const bootCounts={};
        if(boot.D) bootCounts[boot.D]=bD;
        if(boot.F) bootCounts[boot.F]=bF;
        if(boot.O) bootCounts[boot.O]=bO;
        const afterBoot=applyPlantCountsBlock(startState, bootCounts, [boot.D, boot.F, boot.O].filter(Boolean));
        if(!afterBoot) continue;
        const mainRes=solveStageWithForcedProducers(afterBoot, actions, mains, reserve, event, pots, water);
        if(!mainRes) continue;
        const counts={...bootCounts};
        for(const [name,v] of Object.entries(mainRes.counts||{})) counts[name]=(counts[name]||0)+v;
        const bootHours=stageDurationHours(bootCounts, {D:boot.D,F:boot.F,O:boot.O}, pots, water);
        const hours=bootHours + mainRes.hours;
        const candidate={counts, actions, producers:{...mains, boot}, reserve, hours, endState:mainRes.endState, payText:mainRes.payText};
        const score=stageResultScore(candidate, event, hours);
        if(isBetterScore(score, best&&best.score)){
          best={score, ...candidate};
        }
      }
    }
  }
  return best;
}


// 稳定版阶段求解器：用理论下界起步，先找可行解，再逐项压缩，避免旧枚举窗口在部分阶段卡死。
solveStageWithForcedProducers = function(startState, actions, producers, reserve, event, pots, water){
  const crops=[producers.D, producers.F, producers.O].filter(Boolean);
  const totalActionCost=totalCostFromActions(actions);
  if(!crops.length){
    const paid=paymentSummaryOnGenericState(cloneGenericState(startState), totalActionCost, null);
    if(!paid) return null;
    const st=paid.state;
    if(reserve && !canPayCostOnGenericState(st, reserve)) return null;
    if(event.target && sumTargetDeficits(targetDeficitsFromGenericState(st, event.target))>0) return null;
    return { counts:{}, actions, producers, reserve, hours:0, endState:st, payText:paid.text };
  }

  const lb=lowerBoundCounts(startState, actions, producers, reserve, event);
  const counts={};
  for(const crop of crops) counts[crop]=Math.max(0, Math.floor(lb[crop]||0));

  let feasible=null;
  for(let guard=0; guard<256; guard++){
    feasible=evalStageCounts(startState, actions, producers, reserve, event, pots, water, counts);
    if(feasible) break;
    for(const crop of crops){
      const cur=Number(counts[crop]||0);
      counts[crop]=cur + Math.max(1, Math.ceil(cur*0.06));
    }
  }
  if(!feasible) return null;

  // 在可行解附近做单调压缩。固定其它作物，二分每个作物的最小数量；重复两轮处理相互依赖。
  for(let pass=0; pass<2; pass++){
    for(const crop of crops){
      let lo=0, hi=Number(counts[crop]||0), best=hi;
      while(lo<=hi){
        const mid=Math.floor((lo+hi)/2);
        const trial={...counts, [crop]:mid};
        const r=evalStageCounts(startState, actions, producers, reserve, event, pots, water, trial);
        if(r){ best=mid; hi=mid-1; }
        else lo=mid+1;
      }
      counts[crop]=best;
    }
  }

  const finalRes=evalStageCounts(startState, actions, producers, reserve, event, pots, water, counts);
  if(!finalRes) return feasible;
  return finalRes;
};
function stateSummaryText(state, counts=null){
  const items=[];
  const add=(label, count)=>{ if(Number(count||0)>0) items.push(`${label}*${fmtNum(count)}`); };
  add(preferredCropName('D', counts, state), state.df);
  add(labelForSingleBucket('sf', counts, state), state.sf);
  add(labelForSingleBucket('sd', counts, state), state.sd);
  add(preferredCropName('O', counts, state), state.o);
  add(labelForSingleBucket('f', counts, state), state.f);
  add(preferredCropName('OF', counts, state), state.of);
  return items.join('，') || '无';
}
function actionCostText(actions){
  const total=totalCostFromActions(actions);
  const paid=paymentSummaryOnGenericState({ df:0, sd:total.food||0, sf:total.fungus||0, o:total.orn||0, f:total.func||0, of:0 }, total, null);
  if(paid && paid.text) return paid.text;
  const items=[];
  for(const key of TAG_KEYS) if(total[key]>0) items.push(`${KEY_TO_TAG[key]}*${fmtNum(total[key])}`);
  return items.join('，') || '无';
}
function countsText(counts){
  return Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>`${fmtNum(v)}个${k}`).join('，') || '无';
}
function targetMapText(map){
  const items=[];
  for(const key of TAG_KEYS){
    const v=Number((map&&map[key])||0);
    if(v>0) items.push(`${KEY_TO_TAG[key]}*${fmtNum(v)}`);
  }
  return items.join('，') || '无';
}
function renderStageLog(stage){
  const finalLine = stage.finalTarget ? `<br>目标口径库存：${targetMapText(targetProgressFromGenericState(stage.endState, stage.finalTarget))}<br>目标要求：${targetMapText(stage.finalTarget)}` : '';
  return `<div class="line"><span class="stamp">[${fmtDuration(stage.timeStart)}-${fmtDuration(stage.timeEnd)}]</span><br>等级：lv.${stage.levelStart}<br>阶段：${stage.phaseText || stage.title || ''}<br>种植：${countsText(stage.counts)}<br>支付：${stage.payText || actionCostText(stage.actions)}<br>结束库存：${stateSummaryText(stage.endState, stage.counts)}${finalLine}</div>`;
}
function solvePathToEvent(input, events, endIndex, finalTargetForReserve=null){
  let level=input.startLevel;
  let pots=input.startUnlockedPots.length;
  let state=genericStateFromInventory(input.startInv);
  let totalHours=0;
  const stages=[];
  for(let i=0;i<=endIndex;i++){
    const event=events[i];
    if(event.level<level) continue;
    let nextEvent=i<endIndex ? events[i+1] : null;
    if(!nextEvent && finalTargetForReserve && Object.values(finalTargetForReserve).some(v=>Number(v||0)>0)){
      nextEvent={ kind:'finalInventory', level:event.level, target:finalTargetForReserve, text:'最终库存' };
    }
    const stage=solveStage(level, event, nextEvent, state, pots, input.water);
    if(!stage) throw new Error(`阶段求解失败：Lv.${level} → ${event.text}`);
    stages.push({
      title:`阶段：Lv.${level} → ${event.text}`,
      levelStart:level,
      phaseText:event.text,
      timeStart:totalHours,
      timeEnd:totalHours + stage.hours,
      counts:stage.counts,
      actions:stage.actions,
      payText:stage.payText,
      endState:stage.endState,
    });
    totalHours += stage.hours;
    state=stage.endState;
    level=event.level;
    if(event.kind==='potUnlock') pots=Math.max(pots, event.pot);
  }
  return { totalHours, stages, endState:state, level, pots };
}
function solvePlan(input){
  const targetLevel=input.targetLevel==null ? input.startLevel : input.targetLevel;
  if(targetLevel<input.startLevel) throw new Error('目标等级不能小于初始等级。');
  const finalTarget=input.targetInv||{ fungus:0, food:0, orn:0, func:0 };
  const needFinalTarget=Object.values(finalTarget).some(v=>(v||0)>0);
  const desiredPots=allPotNumbers();
  const maxLevel=maxConfiguredLevel();
  const horizonLevel=needFinalTarget ? maxLevel : Math.max(targetLevel, input.startLevel);
  const events=buildPlanningEvents(input.startLevel, targetLevel, desiredPots, input.water, horizonLevel);
  const checkpointIndex=events.findIndex(e=>e.kind==='checkpoint' && e.level===Math.max(targetLevel, input.startLevel));
  if(checkpointIndex<0) throw new Error('内部错误：未找到等级检查点。');
  const candidateIndexes=[];
  if(!needFinalTarget){
    candidateIndexes.push(checkpointIndex);
  }else{
    for(let i=checkpointIndex;i<events.length;i++) candidateIndexes.push(i);
  }
  let best=null;
  let lastErr=null;
  for(const idx of candidateIndexes){
    try{
      const pathRes=solvePathToEvent(input, events, idx, needFinalTarget ? finalTarget : null);
      let totalHours=pathRes.totalHours;
      let stages=[...pathRes.stages];
      let endState=pathRes.endState;
      if(needFinalTarget){
        const invStage=solveStage(pathRes.level, { kind:'finalInventory', level:pathRes.level, target:finalTarget, text:`在${events[idx].text}后攒最终库存` }, null, pathRes.endState, pathRes.pots, input.water);
        if(!invStage) continue;
        stages.push({
          title:`库存阶段：在${events[idx].text}后攒最终库存`,
          levelStart:pathRes.level,
          phaseText:`在${events[idx].text}后攒最终库存`,
          timeStart:totalHours,
          timeEnd:totalHours + invStage.hours,
          counts:invStage.counts,
          actions:invStage.actions,
          payText:invStage.payText,
          endState:invStage.endState,
          finalTarget,
        });
        totalHours += invStage.hours;
        endState=invStage.endState;
        const finalMiss=targetDeficitsFromGenericState(endState, finalTarget);
        if(sumTargetDeficits(finalMiss)>0) continue;
      }
      const plantedCount=stages.reduce((s,st)=>s+Object.values(st.counts||{}).reduce((a,b)=>a+Number(b||0),0),0);
      const finalExcess=needFinalTarget ? targetExcessFromGenericState(endState, finalTarget) : 0;
      const score=needFinalTarget ? [finalExcess, totalHours, plantedCount, idx] : [totalHours, plantedCount, idx];
      if(isBetterScore(score, best&&best.score)){
        best={ score, totalHours, stages, endState, chosenEvent:events[idx] };
      }
    }catch(err){
      lastErr=err;
    }
  }
  if(!best){
    if(lastErr) throw lastErr;
    throw new Error('没有可行的阶段/库存组合方案。');
  }
  return { totalHours:best.totalHours, stages:best.stages, endState:best.endState, chosenEvent:best.chosenEvent };
}

function syncPotsByLevel(){
  const level=Number(document.getElementById('startLevel').value);
  for(const pot of allPotNumbers()){
    const el=document.getElementById(`pot${pot}`);
    if(pot===1){ el.checked=true; el.disabled=true; continue; }
    const req=POT_UNLOCKS[pot].level;
    if(level>=req){
      el.disabled=false;
      if(!el.dataset.touched) el.checked=true;
    }else{
      el.checked=false;
      el.disabled=true;
      delete el.dataset.touched;
    }
  }
  renderTargetLevelOptions(level);
}
function renderTargetLevelOptions(startLevel){
  const targetLevelEl=document.getElementById('targetLevel');
  const prev=targetLevelEl.value || String(maxConfiguredLevel());
  const options=['<option value="none">不限制</option>'];
  for(let v=startLevel; v<=maxConfiguredLevel(); v++){
    options.push(`<option value="${v}">${v}</option>`);
  }
  targetLevelEl.innerHTML=options.join('');
  if(prev==='none'){
    targetLevelEl.value='none';
  }else{
    const prevNum=Number(prev);
    targetLevelEl.value=String(prevNum>=startLevel ? prevNum : startLevel);
  }
}
function readInputs(){
  const inv={};
  for(const crop of cropNames()){
    const el=document.getElementById(`stock_${crop}`);
    if(el){
      const v=Number(el.value)||0;
      if(v>0) inv[crop]=v;
    }
  }
  return {
    water:Number(document.getElementById('water').value),
    startLevel:Number(document.getElementById('startLevel').value),
    targetLevel:document.getElementById('targetLevel').value==='none' ? null : Number(document.getElementById('targetLevel').value),
    startInv:inv,
    targetInv:{
      fungus:Number(document.getElementById('target_fungus').value)||0,
      food:Number(document.getElementById('target_food').value)||0,
      orn:Number(document.getElementById('target_orn').value)||0,
      func:Number(document.getElementById('target_func').value)||0,
    },
    startUnlockedPots:allPotNumbers().filter(i=>document.getElementById(`pot${i}`).checked),
  };
}
function initStockInputs(){
  const box=document.getElementById('stockBox');
  box.innerHTML=cropNames().map(name=>`<div class="stock-card"><div class="name">${name}</div><input id="stock_${name}" type="number" min="0" step="1" value="0" /></div>`).join('');
  const targetBox=document.getElementById('targetBox');
  targetBox.innerHTML=TAG_KEYS.map(key=>`<div class="stock-card"><div class="name">${KEY_TO_TAG[key]}</div><input id="target_${key}" type="number" min="0" step="1" value="0" /></div>`).join('');
}
function init(){
  const potsBox=document.getElementById('potsBox');
  potsBox.innerHTML=allPotNumbers().map(i=>`<label><input type="checkbox" id="pot${i}"> ${i}号</label>`).join('');
  document.getElementById('pot1').checked=true;
  document.getElementById('pot1').disabled=true;
  for(const i of allPotNumbers().filter(p=>p!==1)) document.getElementById(`pot${i}`).addEventListener('change', function(){ this.dataset.touched='1'; });
  document.getElementById('water').innerHTML='<option value="0">0 次（100% 时长）</option><option value="1">1 次（80% 时长）</option><option value="2">2 次（60% 时长）</option><option value="3" selected>3 次（50% 时长）</option>';
  const levelOpts=Array.from({length:maxConfiguredLevel()},(_,i)=>i+1).map(v=>`<option value="${v}" ${v===1?'selected':''}>${v}</option>`).join('');
  document.getElementById('startLevel').innerHTML=levelOpts;
  document.getElementById('targetLevel').innerHTML='';
  document.getElementById('startLevel').addEventListener('change', syncPotsByLevel);
  document.getElementById('water').addEventListener('change', syncPotsByLevel);
  initStockInputs();
  syncPotsByLevel();
  document.getElementById('calcBtn').addEventListener('click', run);
}
function run(){
  const logEl=document.getElementById('log');
  const resEl=document.getElementById('result');
  try{
    const input=readInputs();
    const plan=solvePlan(input);
    resEl.textContent=`预计完成时长：${fmtDuration(plan.totalHours)}`;
    const summary=plan.chosenEvent ? `<div class="line"><span class="act">库存起算阶段：${plan.chosenEvent.text}</span></div>` : '';
    logEl.innerHTML=summary + (plan.stages.map(renderStageLog).join('') || '<div class="small">没有需要生产的内容。</div>');
  }catch(err){
    resEl.textContent='预计完成时长：计算失败';
    logEl.innerHTML=`<div class="warn">${String(err.message||err)}</div>`;
  }
}
init();
window.__gardenPlannerDebug={
  solvePlan, buildKeyEvents, buildStageProducerPlan, nextStageBootstrapReserve,
  solveBestCategoryRates, cropBestRate, plantOnceOnGenericState, payCostOnGenericState,
  genericStateFromInventory, tagTotalsFromGenericState, targetDeficitsFromGenericState
};
