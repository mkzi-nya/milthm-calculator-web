  <style>
    body {

<body>
  <div class="container">
    <div id="search-panel" class="search-panel">
      <input id="search-box" class="search-input" type="text" autocomplete="off" spellcheck="false" placeholder="搜索">
      <button id="search-clear" class="search-button" type="button">清除</button>
    </div>
    <div id="search-help" class="search-help">与游戏内的rainseek搜索框类似，多个tag可用","分隔</div>
    <div id="status-bar" class="status-bar"></div>
    <article id="content" class="markdown-body"></article>
  </div>

  <script>
    const RESOURCES_URL = '../../resources/resources.json';
    const CHAPTERS = [
      { title: '介绍: 天气预报', slug: 'weather_report' },
      { title: '序章: 雨的声音', slug: 'rainfall_sounds' },
      { title: '主线章节一: 甜与苦的一体两面', slug: 'two_sides_of_bitter_and_sweet' },
      { title: '支线章节一: 花裳随雨得春迟', slug: 'a_spring_waiting_in_blossoms' },
      { title: '联动: 雨世界', slug: 'rain_world' },
      { title: '联动: Notanote', slug: 'notanote' },
      { title: '单曲: 梦境磁带', slug: 'dream_tape' },
      { title: '单曲: 露晓卉庭', slug: 'gathering_blossoms_under_rain' }
    ];

    const content = document.getElementById('content');
    const searchPanel = document.getElementById('search-panel');
    const searchHelp = document.getElementById('search-help');
    const searchBox = document.getElementById('search-box');
    const searchClear = document.getElementById('search-clear');
    const statusBar = document.getElementById('status-bar');
    const chapterSlugSet = new Set(CHAPTERS.map(item => item.slug));
    const collatorBase = new Intl.Collator(['en', 'zh-u-co-pinyin', 'ja'], {
      numeric: true,
      sensitivity: 'base'
    });
    const collatorZh = new Intl.Collator('zh-u-co-pinyin', {
      numeric: true,
      sensitivity: 'base'
    });

    let resourcesData = null;
    let songEntries = [];
    let songSlugMap = new Map();
    let songParamMap = new Map();
    let currentRenderedState = {
      markdown: '',
      fileBaseName: '',
      requestType: 'home',
      queryValue: '',
      diagnostics: [],
      viewKind: 'home'
    };
    let renderToken = 0;
    let searchTimer = null;

    const PINYIN_BOUNDARIES = [
      ['A', '啊'], ['B', '芭'], ['C', '擦'], ['D', '搭'], ['E', '蛾'], ['F', '发'],
      ['G', '噶'], ['H', '哈'], ['J', '击'], ['K', '喀'], ['L', '垃'], ['M', '妈'],
      ['N', '拿'], ['O', '哦'], ['P', '啪'], ['Q', '期'], ['R', '然'], ['S', '撒'],
      ['T', '塌'], ['W', '挖'], ['X', '昔'], ['Y', '压'], ['Z', '匝']
    ];

    const KANA_ROMAJI_INITIAL = {
      'あ':'A','ぁ':'A','い':'I','ぃ':'I','う':'U','ぅ':'U','え':'E','ぇ':'E','お':'O','ぉ':'O',
      'か':'K','が':'G','き':'K','ぎ':'G','く':'K','ぐ':'G','け':'K','げ':'G','こ':'K','ご':'G',
      'さ':'S','ざ':'Z','し':'S','じ':'J','す':'S','ず':'Z','せ':'S','ぜ':'Z','そ':'S','ぞ':'Z',
      'た':'T','だ':'D','ち':'C','ぢ':'J','つ':'T','っ':'T','づ':'Z','て':'T','で':'D','と':'T','ど':'D',
      'な':'N','に':'N','ぬ':'N','ね':'N','の':'N',
      'は':'H','ば':'B','ぱ':'P','ひ':'H','び':'B','ぴ':'P','ふ':'F','ぶ':'B','ぷ':'P','へ':'H','べ':'B','ぺ':'P','ほ':'H','ぼ':'B','ぽ':'P',
      'ま':'M','み':'M','む':'M','め':'M','も':'M',
      'や':'Y','ゃ':'Y','ゆ':'Y','ゅ':'Y','よ':'Y','ょ':'Y',
      'ら':'R','り':'R','る':'R','れ':'R','ろ':'R',
      'わ':'W','ゎ':'W','ゐ':'W','ゑ':'W','を':'W','ん':'N',
      'ゔ':'V',
      'ア':'A','ァ':'A','イ':'I','ィ':'I','ウ':'U','ゥ':'U','エ':'E','ェ':'E','オ':'O','ォ':'O',
      'カ':'K','ガ':'G','キ':'K','ギ':'G','ク':'K','グ':'G','ケ':'K','ゲ':'G','コ':'K','ゴ':'G',
      'サ':'S','ザ':'Z','シ':'S','ジ':'J','ス':'S','ズ':'Z','セ':'S','ゼ':'Z','ソ':'S','ゾ':'Z',
      'タ':'T','ダ':'D','チ':'C','ヂ':'J','ツ':'T','ッ':'T','ヅ':'Z','テ':'T','デ':'D','ト':'T','ド':'D',
      'ナ':'N','ニ':'N','ヌ':'N','ネ':'N','ノ':'N',
      'ハ':'H','バ':'B','パ':'P','ヒ':'H','ビ':'B','ピ':'P','フ':'F','ブ':'B','プ':'P','ヘ':'H','ベ':'B','ペ':'P','ホ':'H','ボ':'B','ポ':'P',
      'マ':'M','ミ':'M','ム':'M','メ':'M','モ':'M',
      'ヤ':'Y','ャ':'Y','ユ':'Y','ュ':'Y','ヨ':'Y','ョ':'Y',
      'ラ':'R','リ':'R','ル':'R','レ':'R','ロ':'R',
      'ワ':'W','ヮ':'W','ヰ':'W','ヱ':'W','ヲ':'W','ン':'N',
      'ヴ':'V'
    };

    function escapeMarkdownText(text) {
      return String(text ?? '').replace(/([\\`*_[\]{}()#+\-.!|>])/g, '\\$1');
    }

    function normalizeText(value) {
      return String(value ?? '')
        .normalize('NFKC')
        .trim()
        .toLowerCase();
    }

    function tokenize(value) {
      return normalizeText(value)
        .split(/[\s\-_./,:;()[\]{}"'`~!@#$%^&*+=<>?|\\]+/)
        .filter(Boolean);
    }

    function slugifyLatinTitle(latinTitle) {
      return String(latinTitle ?? '').replace(/[^a-zA-Z0-9]/g, '_');
    }

    function chooseMdFileBase(key, data) {
      const latinTitle = String(data?.latinTitle ?? '').trim();
      const songKey = String(key ?? '').trim();
      const songId = String(data?.songid ?? '').trim();
      return slugifyLatinTitle(latinTitle) || slugifyLatinTitle(songKey) || slugifyLatinTitle(songId) || songKey || latinTitle || songId;
    }

    function addSongParamAlias(map, alias, entry) {
      const raw = String(alias ?? '').trim();
      if (!raw) return;
      const norm = normalizeText(raw);
      const variants = new Set([raw, norm]);
      for (const variant of variants) {
        if (!variant) continue;
        const bucket = map.get(variant) || [];
        if (!bucket.includes(entry)) {
          bucket.push(entry);
          map.set(variant, bucket);
        }
      }
    }

    function findSongEntriesBySongParam(value) {
      const raw = String(value ?? '').trim();
      if (!raw) return [];
      const norm = normalizeText(raw);
      const direct = songParamMap.get(raw) || [];
      const normalized = norm && norm !== raw ? (songParamMap.get(norm) || []) : [];
      const merged = [];
      const seen = new Set();
      for (const entry of [...direct, ...normalized]) {
        if (!seen.has(entry)) {
          seen.add(entry);
          merged.push(entry);
        }
      }
      return merged;
    }

    function firstMeaningfulChar(text) {
      const chars = Array.from(String(text ?? '').trim());
      for (const ch of chars) {
        if (!/\s/.test(ch)) {
          return ch;
        }
      }
      return '';
    }

    function isHan(char) {
      return /\p{Script=Han}/u.test(char);
    }

    function isKana(char) {
      return /[\p{Script=Hiragana}\p{Script=Katakana}]/u.test(char);
    }

    function getPinyinInitial(char) {
      if (!isHan(char)) {
        return char.toUpperCase();
      }
      let result = 'Z';
      for (const [letter, boundary] of PINYIN_BOUNDARIES) {
        if (collatorZh.compare(char, boundary) >= 0) {
          result = letter;
        } else {
          break;
        }
      }
      return result;
    }

    function getJapaneseInitialFromText(text) {
      for (const ch of Array.from(String(text ?? '').trim())) {
        if (KANA_ROMAJI_INITIAL[ch]) {
          return KANA_ROMAJI_INITIAL[ch];
        }
      }
      return '';
    }

    function getFirstChar(str) {
      const s = String(str ?? '').trim();
      return s ? Array.from(s)[0] : '';
    }

    function isUpperAlpha(ch) {
      return /^[A-Z]$/.test(ch);
    }

    function isLowerAlpha(ch) {
      return /^[a-z]$/.test(ch);
    }

    function isDigit(ch) {
      return /^[0-9]$/.test(ch);
    }

    function isHanChar(ch) {
      return /\p{Script=Han}/u.test(ch);
    }

    function isKanaChar(ch) {
      return /[\p{Script=Hiragana}\p{Script=Katakana}]/u.test(ch);
    }

    function getKanaInitial(text) {
      for (const ch of Array.from(String(text ?? ''))) {
        if (KANA_ROMAJI_INITIAL[ch]) {
          return KANA_ROMAJI_INITIAL[ch];
        }
      }
      return 'Z';
    }

    function getUnicodeSortKey(text) {
      return Array.from(String(text ?? ''))
        .map(ch => ch.codePointAt(0).toString(16).padStart(6, '0'))
        .join('-');
    }

    function buildStrictSortKey(entry) {
      const key = String(entry.key ?? '');
      const first = getFirstChar(key);

      if (isUpperAlpha(first)) {
        return {
          group: 0,
          primary: key,
          fallback: key
        };
      }

      if (isLowerAlpha(first)) {
        return {
          group: 1,
          primary: key,
          fallback: key
        };
      }

      if (isDigit(first)) {
        return {
          group: 2,
          primary: key,
          fallback: key
        };
      }

      if (isHanChar(first)) {
        return {
          group: 3,
          primary: getPinyinInitial(first),
          fallback: key
        };
      }

      if (isKanaChar(first)) {
        return {
          group: 4,
          primary: getKanaInitial(key),
          fallback: key
        };
      }

      return {
        group: 5,
        primary: getUnicodeSortKey(first || key),
        fallback: getUnicodeSortKey(key)
      };
    }

    function compareStrict(a, b) {
      const ka = buildStrictSortKey(a);
      const kb = buildStrictSortKey(b);

      if (ka.group !== kb.group) {
        return ka.group - kb.group;
      }

      const primaryCompare = collatorBase.compare(ka.primary, kb.primary);
      if (primaryCompare !== 0) return primaryCompare;

      if (ka.group === 5) {
        const unicodeCompare = ka.fallback.localeCompare(kb.fallback, 'en', { numeric: true, sensitivity: 'variant' });
        if (unicodeCompare !== 0) return unicodeCompare;
      }

      return collatorBase.compare(String(a.key ?? ''), String(b.key ?? ''));
    }

    function pushWeightedField(target, label, value, weight) {
      if (value === null || value === undefined) return;
      if (Array.isArray(value)) {
        value.forEach(item => pushWeightedField(target, label, item, weight));
        return;
      }
      if (typeof value === 'object') return;

      const raw = String(value).trim();
      if (!raw) return;

      const norm = normalizeText(raw);
      if (!norm) return;

      const key = `${label}::${norm}`;
      if (target._dedupe.has(key)) return;
      target._dedupe.add(key);
      target.fields.push({
        label,
        raw,
        norm,
        weight,
        tokens: tokenize(raw)
      });
    }

    function buildSearchBundle(songKey, data) {
      const target = {
        fields: [],
        _dedupe: new Set()
      };

      pushWeightedField(target, 'key', songKey, 180);
      pushWeightedField(target, 'latinTitle', data.latinTitle, 175);
      pushWeightedField(target, 'ResourcesTitle', data.ResourcesTitle, 150);
      pushWeightedField(target, 'songid', data.songid, 145);
      pushWeightedField(target, 'artist', data.artist, 120);
      pushWeightedField(target, 'artistsList', data.artistsList, 118);
      pushWeightedField(target, 'illustrator', data.illustrator, 95);
      pushWeightedField(target, 'illustratorsList', data.illustratorsList, 92);
      pushWeightedField(target, 'tags', data.tags, 88);

      const difficulty = data.difficulty || {};
      for (const [difficultyName, diffData] of Object.entries(difficulty)) {
        pushWeightedField(target, 'difficulty', difficultyName, 70);
        pushWeightedField(target, 'chartid', diffData.chartid, 170);
        pushWeightedField(target, 'charter', diffData.charter, 90);
        pushWeightedField(target, 'chartersList', diffData.chartersList, 88);
        pushWeightedField(target, 'difficultyTags', diffData.tags, 82);
      }

      const exactSet = new Set();
      exactSet.add(normalizeText(songKey));
      exactSet.add(normalizeText(data.latinTitle));
      for (const [, diffData] of Object.entries(difficulty)) {
        exactSet.add(normalizeText(diffData.chartid));
      }
      exactSet.delete('');

      return {
        exactSet,
        fields: target.fields
      };
    }

    function bigrams(text) {
      const source = normalizeText(text).replace(/\s+/g, ' ');
      if (!source) return [];
      if (source.length === 1) return [source];
      const result = [];
      for (let i = 0; i < source.length - 1; i += 1) {
        result.push(source.slice(i, i + 2));
      }
      return result;
    }

    function diceCoefficient(a, b) {
      const aBigrams = bigrams(a);
      const bBigrams = bigrams(b);
      if (!aBigrams.length || !bBigrams.length) return 0;

      const counts = new Map();
      for (const item of aBigrams) {
        counts.set(item, (counts.get(item) || 0) + 1);
      }

      let overlap = 0;
      for (const item of bBigrams) {
        const count = counts.get(item) || 0;
        if (count > 0) {
          overlap += 1;
          counts.set(item, count - 1);
        }
      }

      return (2 * overlap) / (aBigrams.length + bBigrams.length);
    }

    function scoreField(queryNorm, queryTokens, field) {
      const fieldNorm = field.norm;
      if (!fieldNorm) return 0;

      if (fieldNorm === queryNorm) {
        return 100000 + field.weight;
      }

      let score = 0;

      if (fieldNorm.startsWith(queryNorm)) {
        score = Math.max(score, field.weight * 9 + queryNorm.length * 2);
      }

      if (fieldNorm.includes(queryNorm)) {
        score = Math.max(score, field.weight * 7 + (queryNorm.length / Math.max(1, fieldNorm.length)) * 10);
      }

      let tokenHits = 0;
      for (const token of queryTokens) {
        if (fieldNorm.includes(token)) tokenHits += 1;
      }
      if (tokenHits > 0 && queryTokens.length > 0) {
        score = Math.max(score, field.weight * (1.8 + tokenHits / queryTokens.length));
      }

      const dice = diceCoefficient(queryNorm, fieldNorm);
      if (dice > 0.12) {
        score = Math.max(score, field.weight * (1 + dice * 3.5));
      }

      return score;
    }

    function splitEscapedCommaQuery(query) {
      const text = String(query ?? '');
      const parts = [];
      let current = '';
      let escaping = false;

      for (const ch of text) {
        if (escaping) {
          current += ch;
          escaping = false;
          continue;
        }
        if (ch === '\\') {
          escaping = true;
          continue;
        }
        if (ch === ',') {
          parts.push(current.trim());
          current = '';
          continue;
        }
        current += ch;
      }

      if (escaping) current += '\\';
      parts.push(current.trim());
      return parts.filter(Boolean);
    }

    function findBestSearchMatch(query) {
      const queryParts = splitEscapedCommaQuery(query);
      const normalizedParts = queryParts.map(part => normalizeText(part)).filter(Boolean);
      if (!normalizedParts.length) {
        return { exactEntry: null, results: [], queryParts: [] };
      }

      if (normalizedParts.length === 1) {
        const queryNorm = normalizedParts[0];
        for (const entry of songEntries) {
          if (entry.search.exactSet.has(queryNorm)) {
            return { exactEntry: entry, results: [entry], queryParts };
          }
        }
      }

      const ranked = [];
      for (const entry of songEntries) {
        let totalScore = 0;
        let matchedParts = 0;

        for (const queryNorm of normalizedParts) {
          const queryTokens = tokenize(queryNorm);
          let partBestScore = 0;

          for (const field of entry.search.fields) {
            const score = scoreField(queryNorm, queryTokens, field);
            if (score > partBestScore) {
              partBestScore = score;
            }
          }

          if (partBestScore > 0) {
            totalScore += partBestScore;
            matchedParts += 1;
          }
        }

        if (matchedParts > 0) {
          totalScore += matchedParts * 120;
          totalScore *= 1 + matchedParts / normalizedParts.length * 0.35;
          ranked.push({
            entry,
            score: totalScore,
            matchedParts
          });
        }
      }

      ranked.sort((a, b) => {
        if (b.matchedParts !== a.matchedParts) return b.matchedParts - a.matchedParts;
        if (b.score !== a.score) return b.score - a.score;
        return compareStrict(a.entry, b.entry);
      });

      return { exactEntry: null, results: ranked, queryParts };
    }

    async function fetchResources() {
      if (resourcesData) return resourcesData;

      const response = await fetch(RESOURCES_URL, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`加载 resources.json 失败：${response.status}`);
      }

      resourcesData = await response.json();
      songEntries = Object.entries(resourcesData).map(([key, data]) => {
        const latinTitle = String(data?.latinTitle ?? key);
        const songSlug = slugifyLatinTitle(latinTitle);
        const mdFileBase = chooseMdFileBase(key, data);
        const entry = {
          key,
          latinTitle,
          songSlug,
          mdFileBase,
          data,
          sortMeta: null,
          search: null
        };
        entry.search = buildSearchBundle(key, data);
        return entry;
      });

      songEntries.sort(compareStrict);
      songSlugMap = new Map();
      songParamMap = new Map();
      for (const entry of songEntries) {
        const slugBucket = songSlugMap.get(entry.songSlug) || [];
        slugBucket.push(entry);
        songSlugMap.set(entry.songSlug, slugBucket);

        addSongParamAlias(songParamMap, entry.songSlug, entry);
        addSongParamAlias(songParamMap, entry.mdFileBase, entry);
        addSongParamAlias(songParamMap, entry.latinTitle, entry);
        addSongParamAlias(songParamMap, entry.key, entry);
      }
      return resourcesData;
    }

    function buildIndexMarkdown() {
      const lines = ['# 所有曲目', ''];
      for (const entry of songEntries) {
        lines.push(`- [${escapeMarkdownText(entry.key)}](./?song=${encodeURIComponent(entry.songSlug)})`);
      }
      lines.push('', '# 章节目录');
      for (const chapter of CHAPTERS) {
        lines.push(`- [${escapeMarkdownText(chapter.title)}](./?q=${encodeURIComponent(chapter.slug)})`);
      }
      return lines.join('\n');
    }

    function buildLoadFailureMarkdown(title, details, diagnostics) {
      const lines = [
        `# ${title}`,
        '',
        details,
        ''
      ];

      if (diagnostics && diagnostics.length) {
        lines.push('## 诊断信息', '');
        for (const item of diagnostics) {
          const statusText = item.ok
            ? '已成功读取'
            : (item.empty
              ? '文件存在，但内容为空'
              : item.error
                ? `读取失败：${item.error}`
                : `HTTP ${item.status}`);
          lines.push(`- \`${escapeMarkdownText(item.url)}\`：${statusText}`);
        }
      }
      return lines.join('\n');
    }

    async function fetchMarkdownByBaseName(baseName) {
      const safeBaseName = String(baseName ?? '').trim();
      const url = `./${encodeURIComponent(safeBaseName)}.md`;
      try {
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) {
          return { ok: false, baseName: safeBaseName, url, status: response.status };
        }
        const text = await response.text();
        if (!text || !text.trim()) {
          return { ok: false, empty: true, baseName: safeBaseName, url, status: response.status, text };
        }
        return { ok: true, baseName: safeBaseName, url, status: response.status, text };
      } catch (error) {
        return {
          ok: false,
          baseName: safeBaseName,
          url,
          error: String(error && error.message ? error.message : error)
        };
      }
    }

    async function loadSongMarkdown(entry) {
      const candidates = [];
      const seen = new Set();
      const diagnostics = [];

      for (const candidate of [entry.mdFileBase, entry.songSlug, entry.latinTitle, entry.key]) {
        const baseName = String(candidate ?? '').trim();
        if (!baseName || seen.has(baseName)) continue;
        seen.add(baseName);
        candidates.push(baseName);
      }

      for (const baseName of candidates) {
        const result = await fetchMarkdownByBaseName(baseName);
        diagnostics.push(result);
        if (result.ok) {
          return {
            markdown: result.text,
            fileBaseName: result.baseName,
            diagnostics,
            requestType: 'song'
          };
        }
      }

      return {
        markdown: buildLoadFailureMarkdown(
          '曲目文件未找到或读取失败',
          `曲目 **${escapeMarkdownText(entry.key)}** 的 Markdown 未能成功加载。`,
          diagnostics
        ),
        fileBaseName: '',
        diagnostics,
        requestType: 'song',
        hasError: true
      };
    }

    function extractRequest() {
      const url = new URL(window.location.href);
      const song = url.searchParams.get('song');
      if (song !== null && song !== '') {
        return { type: 'song', value: song };
      }

      const q = url.searchParams.get('q');
      if (q !== null) {
        return { type: 'q', value: q };
      }

      const rawSearch = window.location.search.replace(/^\?/, '');
      if (rawSearch && !rawSearch.includes('=')) {
        try {
          return { type: 'q', value: decodeURIComponent(rawSearch) };
        } catch {
          return { type: 'q', value: rawSearch };
        }
      }

      return { type: 'home', value: '' };
    }

    function buildSearchResultsMarkdown(query, rankedResults) {
      const lines = [
        '# 搜索结果',
        '',
        `> 查询：\`${String(query ?? '').replace(/`/g, '\\`')}\``,
        ''
      ];

      if (!rankedResults.length) {
        lines.push('没有找到匹配项。');
        return lines.join('\n');
      }

      for (const item of rankedResults) {
        const entry = item.entry;
        const titleSuffix = entry.latinTitle && entry.latinTitle !== entry.key
          ? ` — ${escapeMarkdownText(entry.latinTitle)}`
          : '';
        lines.push(`- [${escapeMarkdownText(entry.key)}](./?song=${encodeURIComponent(entry.songSlug)})${titleSuffix}`);
      }

      return lines.join('\n');
    }

    function transformMarkdownLinks(mdContent) {
      return String(mdContent ?? '').replace(/\[([^\]]+)\]\((info:[^)]+)\)/g, function (match, text, target) {
        const encoded = encodeURIComponent(target.slice(5));
        return `[${text}](info:${encoded})`;
      });
    }

    function setStatus(message, type = '') {
      const text = String(message ?? '').trim();
      if (!text) {
        statusBar.textContent = '';
        statusBar.className = 'status-bar';
        return;
      }
      statusBar.textContent = text;
      statusBar.className = `status-bar visible${type ? ` ${type}` : ''}`;
    }

    async function convertImageUrlToPngBlobUrl(url) {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`图片加载失败：${response.status} ${url}`);
      }

      const blob = await response.blob();
      const bitmap = await createImageBitmap(blob);

      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;

      const ctx = canvas.getContext('2d');
      if (!ctx) {
        throw new Error('无法获取 canvas 2D 上下文');
      }

      ctx.drawImage(bitmap, 0, 0);

      const pngBlob = await new Promise((resolve, reject) => {
        canvas.toBlob(result => {
          if (result) resolve(result);
          else reject(new Error('PNG 导出失败'));
        }, 'image/png');
      });

      return URL.createObjectURL(pngBlob);
    }

    async function replaceAvifImagesWithPng(root = document) {
      const images = Array.from(root.querySelectorAll('img'));

      for (const img of images) {
        const src = img.getAttribute('src') || '';
        if (!/\.avif(\?.*)?(#.*)?$/i.test(src)) continue;

        try {
          const pngBlobUrl = await convertImageUrlToPngBlobUrl(src);
          img.dataset.originalSrc = src;
          img.src = pngBlobUrl;
        } catch (error) {
          console.error('AVIF 转 PNG 失败：', src, error);
        }
      }
    }

    async function renderMarkdown(mdContent) {
      const safeMarkdown = transformMarkdownLinks(mdContent);
      let rendered = '';
      try {
        rendered = marked.parse(safeMarkdown, { headerIds: true, mangle: false });
      } catch (error) {
        throw new Error(`Markdown 渲染失败：${String(error && error.message ? error.message : error)}`);
      }

      if (!rendered || !String(rendered).trim()) {
        throw new Error('Markdown 渲染结果为空。');
      }

      content.innerHTML = rendered;

      await replaceAvifImagesWithPng(content);

      content.querySelectorAll('h2,h3,h4').forEach(h => {
        h.id = h.innerText.toLowerCase().replace(/\s+/g, '-');
      });

      hljs.highlightAll();
      resizeKatex();
      bindSpecialLinks();
      loadDev();
      setStatus('');
    }

    async function resolveRequestToState(request) {
      await fetchResources();

      if (request.type === 'home') {
        return {
          markdown: buildIndexMarkdown(),
          fileBaseName: '',
          requestType: 'home',
          queryValue: '',
          diagnostics: [],
          viewKind: 'home'
        };
      }

      if (request.type === 'song') {
        const entries = findSongEntriesBySongParam(request.value);
        if (!entries || entries.length === 0) {
          return {
            markdown: [
              '# 曲目不存在',
              '',
              `未找到 song 参数 **${escapeMarkdownText(request.value)}** 对应的曲目。`
            ].join('\n'),
            fileBaseName: '',
            requestType: 'song',
            queryValue: '',
            diagnostics: [],
            hasError: true,
            viewKind: 'markdown'
          };
        }

        if (entries.length === 1) {
          const result = await loadSongMarkdown(entries[0]);
          return {
            ...result,
            queryValue: '',
            viewKind: 'markdown'
          };
        }

        return {
          markdown: [
            '# 曲目需消歧',
            '',
            `song 参数 **${escapeMarkdownText(request.value)}** 对应了多个曲目：`,
            '',
            ...entries.map(entry => `- [${escapeMarkdownText(entry.key)}](./?q=${encodeURIComponent(entry.key)})`)
          ].join('\n'),
          fileBaseName: '',
          requestType: 'song',
          queryValue: '',
          diagnostics: [],
          hasError: true,
          viewKind: 'markdown'
        };
      }

      if (request.type === 'q') {
        const queryValue = String(request.value ?? '');

        if (!queryValue.trim()) {
          return {
            markdown: buildIndexMarkdown(),
            fileBaseName: '',
            requestType: 'home',
            queryValue: '',
            diagnostics: [],
            viewKind: 'home'
          };
        }

        if (chapterSlugSet.has(queryValue)) {
          const chapterResult = await fetchMarkdownByBaseName(queryValue);
          if (chapterResult.ok) {
            return {
              markdown: chapterResult.text,
              fileBaseName: chapterResult.baseName,
              requestType: 'q',
              queryValue,
              diagnostics: [chapterResult],
              viewKind: 'markdown'
            };
          }
          return {
            markdown: buildLoadFailureMarkdown(
              '章节文件未找到或读取失败',
              `未能成功加载章节 **${escapeMarkdownText(queryValue)}** 对应的 Markdown 文件。`,
              [chapterResult]
            ),
            fileBaseName: '',
            requestType: 'q',
            queryValue,
            diagnostics: [chapterResult],
            hasError: true,
            viewKind: 'markdown'
          };
        }

        const matched = findBestSearchMatch(queryValue);
        if (matched.exactEntry) {
          const result = await loadSongMarkdown(matched.exactEntry);
          return {
            ...result,
            requestType: 'q',
            queryValue,
            viewKind: 'markdown'
          };
        }

        return {
          markdown: buildSearchResultsMarkdown(queryValue, matched.results),
          fileBaseName: '',
          requestType: 'q',
          queryValue,
          diagnostics: [],
          viewKind: 'search'
        };
      }

      return {
        markdown: buildIndexMarkdown(),
        fileBaseName: '',
        requestType: 'home',
        queryValue: '',
        diagnostics: [],
        viewKind: 'home'
      };
    }

    function updateSearchVisibility(state) {
      const viewKind = String(state?.viewKind || 'home');
      const shouldShowSearch = viewKind === 'home' || viewKind === 'search';
      searchPanel.style.display = shouldShowSearch ? 'flex' : 'none';
      searchHelp.style.display = shouldShowSearch ? 'block' : 'none';
      if (!shouldShowSearch) {
        searchBox.blur();
      }
    }

    function updateUrlForRequest(request) {
      const url = new URL(window.location.href);
      url.search = '';
      if (request.type === 'song' && request.value) {
        url.searchParams.set('song', request.value);
      } else if (request.type === 'q' && request.value) {
        url.searchParams.set('q', request.value);
      }
      history.replaceState(null, '', url.toString());
    }

    async function applyRequest(request, options = {}) {
      const token = ++renderToken;
      if (!options.silent) {
        setStatus('正在加载…');
      }

      try {
        const state = await resolveRequestToState(request);
        if (token !== renderToken) return;

        currentRenderedState = state;
        searchBox.value = state.queryValue || '';
        updateSearchVisibility(state);
        if (options.updateUrl !== false) {
          updateUrlForRequest(request.type === 'home' ? { type: 'home', value: '' } : request);
        }

        await renderMarkdown(state.markdown);
        if (state.hasError) {
          setStatus('页面已显示错误详情。', 'error');
        }
      } catch (error) {
        if (token !== renderToken) return;
        const errorMessage = String(error && error.message ? error.message : error);
        currentRenderedState = {
          markdown: [
            '# 页面加载失败',
            '',
            '无法完成页面初始化。',
            '',
            '```text',
            errorMessage,
            '```'
          ].join('\n'),
          fileBaseName: '',
          requestType: request.type || 'home',
          queryValue: request.type === 'q' ? String(request.value ?? '') : '',
          diagnostics: [],
          hasError: true,
          viewKind: 'markdown'
        };
        searchBox.value = currentRenderedState.queryValue || '';
        updateSearchVisibility(currentRenderedState);
        try {
          await renderMarkdown(currentRenderedState.markdown);
        } catch {
          content.innerHTML = `<pre>${errorMessage.replace(/[&<>]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[ch]))}</pre>`;
        }
        setStatus(errorMessage, 'error');
        console.error(error);
      }
    }

    function downloadCurrentMarkdown() {
      const markdown = String(currentRenderedState.markdown ?? '');
      if (!markdown.trim()) {
        setStatus('当前没有可下载的 Markdown 内容。', 'error');
        return;
      }
      const filenameBase = currentRenderedState.fileBaseName || 'document';
      const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = `${filenameBase}.md`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setStatus(`已开始下载 ${filenameBase}.md`);
    }

    function bindSpecialLinks() {
      const links = content.querySelectorAll('a[href^="info:"]');
      links.forEach(link => {
        if (link.dataset.specialBound) return;
        link.dataset.specialBound = '1';
        const href = decodeURIComponent(link.getAttribute('href') || '');

        if (href === 'info:download') {
          link.addEventListener('click', function (event) {
            event.preventDefault();
            downloadCurrentMarkdown();
          });
          return;
        }

        if (href.startsWith('info:info')) {
          link.addEventListener('click', function (event) {
            event.preventDefault();
          });
        }
      });
    }

    function resizeKatex() {
      const markdownBody = document.querySelector('.markdown-body');
      if (!markdownBody) return;

      const width = markdownBody.clientWidth;
      document.querySelectorAll('.katex-display').forEach(element => {
        element.style.fontSize = '';
        const actualWidth = element.scrollWidth;
        if (actualWidth > width) {
          const fontSize = parseFloat(getComputedStyle(element).fontSize);
          element.style.fontSize = (fontSize * width / actualWidth) + 'px';
        }
      });
    }

    const hoverState = new Map();
    const HIDE_DELAY_MS = 120;

    function ensureState(key) {
      if (!hoverState.has(key)) {
        hoverState.set(key, { hoverLink: false, hoverDev: false, el: null, timer: null });
      }
      return hoverState.get(key);
    }

    function scheduleHide(key) {
      const state = ensureState(key);
      if (state.timer) clearTimeout(state.timer);
      state.timer = setTimeout(() => {
        if (!state.hoverLink && !state.hoverDev && state.el) {
          state.el.classList.remove('visible');
        }
        state.timer = null;
      }, HIDE_DELAY_MS);
    }

    function placeAndShowForLink(aaaElement, linkRect) {
      if (!aaaElement) return;

      aaaElement.classList.add('visible');
      const topPosition = linkRect.bottom + window.scrollY;
      let leftPosition = linkRect.left + linkRect.width / 2 + window.scrollX - aaaElement.offsetWidth / 2;

      const screenWidth = window.innerWidth;
      const elementWidth = aaaElement.offsetWidth;
      if (leftPosition + elementWidth > screenWidth) leftPosition = screenWidth - elementWidth;
      else if (leftPosition < 0) leftPosition = 0;

      aaaElement.style.position = 'absolute';
      aaaElement.style.top = `${topPosition}px`;
      aaaElement.style.left = `${leftPosition}px`;
    }

    function loadDev() {
      fetch(`../chartdev.html?${Date.now()}`)
        .then(res => {
          if (!res.ok) throw new Error(`加载 chartdev.html 失败：${res.status}`);
          return res.text();
        })
        .then(html => {
          const temp = document.createElement('div');
          temp.innerHTML = html;

          const nodes = temp.querySelectorAll('div[aaa]');
          nodes.forEach(node => {
            const key = node.getAttribute('aaa');
            const escapedKey = (window.CSS && typeof CSS.escape === 'function') ? CSS.escape(key) : key.replace(/"/g, '\\"');
            if (!document.querySelector(`body > div[aaa="${escapedKey}"]`)) {
              node.style.position = node.style.position || 'absolute';
              document.body.appendChild(node);

              node.addEventListener('mouseenter', () => {
                const currentKey = node.getAttribute('aaa');
                const state = ensureState(currentKey);
                state.el = node;
                state.hoverDev = true;
                node.classList.add('visible');
                if (state.timer) {
                  clearTimeout(state.timer);
                  state.timer = null;
                }
              });

              node.addEventListener('mouseleave', () => {
                const currentKey = node.getAttribute('aaa');
                const state = ensureState(currentKey);
                state.hoverDev = false;
                scheduleHide(currentKey);
              });
            }
          });
        })
        .catch(err => console.error(err));
    }

    let currentKey = null;
    let currentEl = null;
    let isMorphing = false;
    const MORPH_SWAP_DELAY = 40;

    function morphToTarget(targetEl, linkRect, targetKey) {
      if (!currentEl || !targetEl || currentEl === targetEl) return;

      if (currentKey) {
        const oldState = ensureState(currentKey);
        if (oldState.timer) {
          clearTimeout(oldState.timer);
          oldState.timer = null;
        }
        oldState.hoverLink = false;
        oldState.hoverDev = false;
        oldState.el = currentEl;
      }

      currentEl.classList.add('visible');
      placeAndShowForLink(currentEl, linkRect);

      setTimeout(() => {
        currentEl.innerHTML = targetEl.innerHTML;
        currentEl.setAttribute('aaa', targetKey);

        targetEl.classList.remove('visible');
        targetEl.style.top = '-99999px';
        targetEl.style.left = '-99999px';

        currentKey = targetKey;
        const newState = ensureState(currentKey);
        newState.el = currentEl;
        newState.hoverLink = false;
        newState.hoverDev = false;

        isMorphing = false;
      }, MORPH_SWAP_DELAY);
    }

    function showByMorphOrDirect(targetKey, linkRect) {
      const selectorKey = (window.CSS && typeof CSS.escape === 'function') ? CSS.escape(targetKey) : targetKey.replace(/"/g, '\\"');
      const targetEl = document.querySelector(`div[aaa="${selectorKey}"]`);
      if (!targetEl) return;

      if (!currentEl) {
        currentEl = targetEl;
        currentKey = targetKey;
        const state = ensureState(targetKey);
        state.el = currentEl;
        state.hoverLink = true;
        if (state.timer) {
          clearTimeout(state.timer);
          state.timer = null;
        }
        placeAndShowForLink(currentEl, linkRect);
        return;
      }

      if (currentEl && currentKey !== targetKey && !isMorphing) {
        isMorphing = true;
        morphToTarget(targetEl, linkRect, targetKey);
        return;
      }

      placeAndShowForLink(currentEl, linkRect);
    }

    function parseInfoKeyFromAnchor(anchor) {
      const href = decodeURIComponent(anchor.getAttribute('href') || '');
      const match = href.match(/^info:info\((.*)\)$/);
      if (!match) return null;
      const params = match[1].split(',').map(param => param.trim().replace(/['"]/g, ''));
      const key = (params.length === 2) ? params.join(',') : params[0];
      return key || null;
    }

    function bindLinkHoverAndClick(target) {
      if (target.dataset.aaaBound) return;
      target.dataset.aaaBound = '1';

      target.addEventListener('mouseenter', () => {
        const key = parseInfoKeyFromAnchor(target);
        if (!key) return;
        const state = ensureState(key);
        state.hoverLink = true;
        if (state.timer) {
          clearTimeout(state.timer);
          state.timer = null;
        }
        showByMorphOrDirect(key, target.getBoundingClientRect());
      });

      target.addEventListener('mouseleave', () => {
        const key = parseInfoKeyFromAnchor(target);
        if (!key) return;
        const state = ensureState(key);
        state.hoverLink = false;
        scheduleHide(key);
      });

      target.addEventListener('click', (e) => {
        const key = parseInfoKeyFromAnchor(target);
        if (!key) return;
        e.preventDefault();
        showByMorphOrDirect(key, target.getBoundingClientRect());
      });
    }

    function checkMouseOnLink(event) {
      const target = event.target;
      if (!(target instanceof HTMLAnchorElement)) return;

      const key = parseInfoKeyFromAnchor(target);
      if (!key) return;

      bindLinkHoverAndClick(target);

      const selectorKey = (window.CSS && typeof CSS.escape === 'function') ? CSS.escape(key) : key.replace(/"/g, '\\"');
      const aaaElement = currentEl && currentKey === key
        ? currentEl
        : document.querySelector(`div[aaa="${selectorKey}"]`);
      if (!aaaElement) return;

      const state = ensureState(key);
      state.el = currentEl || aaaElement;
      state.hoverLink = true;
      placeAndShowForLink(state.el, target.getBoundingClientRect());
    }

    function queueSearchFromInput() {
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const rawValue = searchBox.value;
        const request = rawValue.trim()
          ? { type: 'q', value: rawValue }
          : { type: 'home', value: '' };
        applyRequest(request, { updateUrl: true });
      }, 120);
    }

    function initSearchUi() {
      searchBox.addEventListener('input', queueSearchFromInput);
      searchBox.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
          if (searchTimer) {
            clearTimeout(searchTimer);
            searchTimer = null;
          }
          const rawValue = searchBox.value;
          const request = rawValue.trim()
            ? { type: 'q', value: rawValue }
            : { type: 'home', value: '' };
          applyRequest(request, { updateUrl: true });
        }
      });
      searchClear.addEventListener('click', () => {
        searchBox.value = '';
        applyRequest({ type: 'home', value: '' }, { updateUrl: true });
      });
      window.addEventListener('popstate', () => {
        applyRequest(extractRequest(), { updateUrl: false, silent: true });
      });
    }

    async function initPage() {
      initSearchUi();
      await applyRequest(extractRequest(), { updateUrl: false, silent: true });
    }

    window.addEventListener('resize', resizeKatex);
    window.addEventListener('load', initPage);
    document.addEventListener('mousemove', checkMouseOnLink);
  </script>
</body>
</html>
