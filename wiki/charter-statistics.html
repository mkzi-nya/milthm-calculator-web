</script><script> function loadMarkdown() { let md = document.getElementById('md').textContent.replace(/^\n/, ''); // 链接自动转义处理（原逻辑保留） md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (match, p1, p2) { if (p2.startsWith('info:')) { const [protocol, rest] = p2.split(':', 2); const encodedRest = encodeURIComponent(rest); return `[${p1}](${protocol}:${encodedRest})`; } return match; }); content.innerHTML = marked.parse(md, { headerIds: true, mangle: false }); content.querySelectorAll('h2,h3,h4').forEach(h => { h.id = h.innerText.toLowerCase().replace(/\s+/g, '-'); }); hljs.highlightAll(); resizeKatex(); runJavascriptLinks(); loadDev(); } function runJavascriptLinks() { const links = document.querySelectorAll('a[href^="info:info"], a[href^="info:info"]'); links.forEach(link => { link.addEventListener('click', function (event) { event.preventDefault(); }); }); } function resizeKatex() { const w = document.querySelector('.markdown-body').clientWidth; document.querySelectorAll('.katex-display').forEach(e => { e.style.fontSize = ''; const actual = e.scrollWidth; if (actual > w) { const fs = parseFloat(getComputedStyle(e).fontSize); e.style.fontSize = (fs * w / actual) + 'px'; } }); } // ===== 悬停状态管理：保持 dev 内可交互，离开两端再隐藏 ===== const hoverState = new Map(); // key -> { hoverLink: bool, hoverDev: bool, el: HTMLElement, timer: number|null } const HIDE_DELAY_MS = 120; function ensureState(key) { if (!hoverState.has(key)) { hoverState.set(key, { hoverLink: false, hoverDev: false, el: null, timer: null }); } return hoverState.get(key); } function scheduleHide(key) { const state = ensureState(key); if (state.timer) clearTimeout(state.timer); state.timer = setTimeout(() => { if (!state.hoverLink && !state.hoverDev && state.el) { state.el.classList.remove('visible'); } state.timer = null; }, HIDE_DELAY_MS); } function placeAndShowForLink(aaaElement, linkRect) { if (!aaaElement) return; // 显示 aaaElement.classList.add('visible'); // 放在链接正下方并水平居中 const topPosition = linkRect.bottom + window.scrollY; let leftPosition = linkRect.left + linkRect.width / 2 + window.scrollX - aaaElement.offsetWidth / 2; const screenWidth = window.innerWidth; const elementWidth = aaaElement.offsetWidth; if (leftPosition + elementWidth > screenWidth) leftPosition = screenWidth - elementWidth; else if (leftPosition < 0) leftPosition = 0; aaaElement.style.position = 'absolute'; aaaElement.style.top = `${topPosition}px`; aaaElement.style.left = `${leftPosition}px`; } // ===== 从 chartdev.html 直接载入并挂到 body（保持与原 load.js 一致）===== // ===== 从 chartdev.html 直接载入并挂到 body（保持与原 load.js 一致）===== function loadDev() { fetch(`./chartdev.html?${Date.now()}`) .then(res => { if (!res.ok) throw new Error(`加载 chartdev.html 失败：${res.status}`); return res.text(); }) .then(html => { const temp = document.createElement('div'); temp.innerHTML = html; const nodes = temp.querySelectorAll('div[aaa]'); nodes.forEach(node => { const key = node.getAttribute('aaa'); if (!document.querySelector(`body > div[aaa="${CSS.escape(key)}"]`)) { node.style.position = node.style.position || 'absolute'; document.body.appendChild(node); // dev 悬停监听：进入 dev 时保持显示，离开 dev 时可能隐藏 node.addEventListener('mouseenter', () => { const k = node.getAttribute('aaa'); // ✅ 动态读取 const st = ensureState(k); st.el = node; st.hoverDev = true; node.classList.add('visible'); if (st.timer) { clearTimeout(st.timer); st.timer = null; } }); node.addEventListener('mouseleave', () => { const k = node.getAttribute('aaa'); // ✅ 动态读取 const st = ensureState(k); st.hoverDev = false; scheduleHide(k); }); } }); }) .catch(err => console.error(err)); } // ===== Morph 相关：点击链接时顺滑切换 ===== let currentKey = null; // 当前“主”窗口绑定的 key let currentEl = null; // 当前“主”窗口引用的 DOM 元素（会被复用以移动/换内容） let isMorphing = false; // 动画中防抖 const MORPH_SWAP_DELAY = 40; // 轻微延迟以确保位置先到再替换内容 /** * 将上一个窗口（currentEl）移动到新链接下方，并把内容替换为新窗口内容 * @param {HTMLElement} targetEl 目标 key 的 dev 节点（供取内容使用） * @param {DOMRect} linkRect 新链接的 rect * @param {String} targetKey 目标 key */ function morphToTarget(targetEl, linkRect, targetKey) { if (!currentEl || !targetEl || currentEl === targetEl) return; // 1) 取消老 key 的隐藏、定时器，并标记当前元素为可见 if (currentKey) { const oldState = ensureState(currentKey); if (oldState.timer) { clearTimeout(oldState.timer); oldState.timer = null; } oldState.hoverLink = false; // 点击时不强依赖 hover oldState.hoverDev = false; oldState.el = currentEl; } currentEl.classList.add('visible'); // 2) 平滑移动到新位置 placeAndShowForLink(currentEl, linkRect); // 3) 微延迟后替换内容与 key（让用户先看到“飞过去”，再变文字） setTimeout(() => { // 替换内部内容 currentEl.innerHTML = targetEl.innerHTML; // 更新 aaa key（后续 hover/隐藏依赖） currentEl.setAttribute('aaa', targetKey); // 隐藏/移除目标原节点，避免重复（保留在 DOM 但不可见即可） targetEl.classList.remove('visible'); targetEl.style.top = '-99999px'; targetEl.style.left = '-99999px'; // 更新 currentKey & 状态 currentKey = targetKey; const newState = ensureState(currentKey); newState.el = currentEl; newState.hoverLink = false; newState.hoverDev = false; isMorphing = false; }, MORPH_SWAP_DELAY); } /** * 以“当前元素优先”的策略显示目标窗口： * - 若已有 currentEl：将其移动并替换为目标内容（morph） * - 否则正常显示目标元素本身 */ function showByMorphOrDirect(targetKey, linkRect) { const targetEl = document.querySelector(`div[aaa="${targetKey}"]`); if (!targetEl) return; // 如果从未有过 currentEl，则以 targetEl 为主 if (!currentEl) { currentEl = targetEl; currentKey = targetKey; const st = ensureState(targetKey); st.el = currentEl; st.hoverLink = true; if (st.timer) { clearTimeout(st.timer); st.timer = null; } placeAndShowForLink(currentEl, linkRect); return; } // 若已有 currentEl 且 key 不同，执行 morph if (currentEl && currentKey !== targetKey && !isMorphing) { isMorphing = true; morphToTarget(targetEl, linkRect, targetKey); return; } // key 相同或正在 morph，就直接更新位置即可 placeAndShowForLink(currentEl, linkRect); } // ===== 监听鼠标移动到链接（hover）与点击（click）===== function parseInfoKeyFromAnchor(anchor) { const url = decodeURIComponent(anchor.href || ''); const match = url.match(/(info)\(([^)]*)\)/); if (!match) return null; const params = match[2].split(',').map(param => param.trim().replace(/['"]/g, '')); const key = (params.length === 2) ? params.join(',') : params[0]; return key || null; } function bindLinkHoverAndClick(target) { if (target.dataset.aaaBound) return; target.dataset.aaaBound = '1'; // Hover 行为：与之前一致（但会优先复用 currentEl 以避免两个窗口闪烁） target.addEventListener('mouseenter', () => { const key = parseInfoKeyFromAnchor(target); if (!key) return; const state = ensureState(key); state.hoverLink = true; if (state.timer) { clearTimeout(state.timer); state.timer = null; } showByMorphOrDirect(key, target.getBoundingClientRect()); }); target.addEventListener('mouseleave', () => { const key = parseInfoKeyFromAnchor(target); if (!key) return; const state = ensureState(key); state.hoverLink = false; scheduleHide(key); }); // 点击行为：触发“平滑切换”动画（morph 优先） target.addEventListener('click', (e) => { // 原本我们已阻止 info:info 的默认跳转；此处确保一次 e.preventDefault(); const key = parseInfoKeyFromAnchor(target); if (!key) return; showByMorphOrDirect(key, target.getBoundingClientRect()); }); } // 捕获全局鼠标移动，动态绑定链接（保持与原有逻辑兼容） function checkMouseOnLink(event) { const target = event.target; if (target.tagName !== 'A') return; const key = parseInfoKeyFromAnchor(target); if (!key) return; // 先绑定 hover/click bindLinkHoverAndClick(target); // 在 mousemove 命中时也刷新位置与显示，保证体验顺滑 const aaaElement = currentEl && currentKey === key ? currentEl : document.querySelector(`div[aaa="${key}"]`); if (!aaaElement) return; const state = ensureState(key); state.el = currentEl || aaaElement; state.hoverLink = true; // 若当前就是这个 key，用当前元素定位即可 placeAndShowForLink(state.el, target.getBoundingClientRect()); } // ===== 初始化 ===== window.addEventListener('resize', resizeKatex); window.addEventListener('load', loadMarkdown); document.addEventListener('mousemove', checkMouseOnLink); </script></body></html>
